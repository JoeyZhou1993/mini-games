<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Triple Match 3D Demo</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { width:100%; height:100%; overflow:hidden; background:#1c2030; font-family:-apple-system,"PingFang SC","Helvetica Neue",Arial,sans-serif; }
  #stage { position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); background:#3d4460; overflow:hidden; border-radius:12px; }
  canvas { display:block; }
  .ui { position:absolute; inset:0; pointer-events:none; }

  #levelLabel { position:absolute; top:14px; left:12px; color:#cdd6ff; font-weight:800; font-size:16px; }
  #levelLabel b { color:#fff; }

  #timerPill { position:absolute; top:10px; left:50%; transform:translateX(-50%); background:rgba(10,12,20,.75);
    color:#fff; font-weight:800; font-size:17px; padding:5px 14px 5px 10px; border-radius:10px; display:flex; align-items:center; gap:6px; }
  #timerPill .clock { width:18px; height:18px; border-radius:50%; background:radial-gradient(circle at 35% 35%, #ffd76b, #e89b1c); display:inline-block; }

  #goals { position:absolute; top:48px; left:10px; display:flex; gap:8px; }
  .goalCard { width:52px; height:62px; background:linear-gradient(#ffffff,#dfe4f2); border-radius:10px; position:relative;
    display:flex; align-items:center; justify-content:center; font-size:30px; box-shadow:0 3px 6px rgba(0,0,0,.35); transition:transform .15s, opacity .3s; }
  .goalCard .cnt { position:absolute; top:-6px; left:-6px; background:#3b3f52; color:#fff; font-size:13px; font-weight:800;
    min-width:20px; height:20px; border-radius:7px; display:flex; align-items:center; justify-content:center; padding:0 4px; }
  .goalCard.done { background:linear-gradient(#fef9d9,#ffd76b); }
  .goalCard.done .cnt { background:#2ba84a; }
  .goalCard.done .cnt::after { content:"✓"; }
  .goalCard.done .cnt span { display:none; }
  .goalCard.pulse { transform:scale(1.15); }

  #tray { position:absolute; left:50%; transform:translateX(-50%); bottom:74px; width:calc(100% - 20px); max-width:400px;
    background:linear-gradient(#2a2d3d,#171923); border-radius:14px; padding:7px; display:flex; gap:5px; box-shadow:inset 0 2px 8px rgba(0,0,0,.6), 0 2px 0 rgba(255,255,255,.06); }
  .slot { flex:1; aspect-ratio:1; background:linear-gradient(#171a24,#232636); border-radius:9px; display:flex; align-items:center; justify-content:center;
    font-size:26px; box-shadow:inset 0 2px 4px rgba(0,0,0,.5); position:relative; }
  .slot .item { transition:transform .12s; }
  .slot.pop .item { animation:popout .3s forwards; }
  @keyframes popout { 0%{transform:scale(1)} 40%{transform:scale(1.35)} 100%{transform:scale(0); opacity:0} }

  #boosters { position:absolute; left:50%; transform:translateX(-50%); bottom:10px; width:calc(100% - 20px); max-width:400px;
    display:flex; gap:8px; align-items:center; }
  .boost { flex:1; height:52px; background:linear-gradient(#454a63,#2b2e40); border-radius:12px; display:flex; flex-direction:column;
    align-items:center; justify-content:center; color:#aeb6d8; font-size:11px; font-weight:700; position:relative; pointer-events:auto; border:none; }
  .boost .ic { font-size:22px; line-height:1; }
  .boost.locked { opacity:.75; }
  .boost .badge { position:absolute; top:-6px; right:-4px; background:#b04ae0; color:#fff; font-size:12px; font-weight:800;
    width:20px; height:20px; border-radius:50%; display:flex; align-items:center; justify-content:center; }
  #magnetBtn { background:linear-gradient(#5a83f0,#3454b8); color:#fff; cursor:pointer; }
  #magnetBtn:active { transform:scale(.94); }
  #pauseBtn { flex:0 0 44px; height:44px; border-radius:10px; background:#2b2e40; color:#fff; font-size:16px; border:none; pointer-events:auto; }

  #magnetTip { position:absolute; left:50%; transform:translateX(-50%); bottom:140px; background:linear-gradient(#fff7e0,#ffe9ad);
    border:2px solid #e0a53c; color:#7a4d00; font-size:13px; font-weight:700; padding:7px 12px; border-radius:9px; white-space:nowrap;
    opacity:0; transition:opacity .3s; }

  .overlay { position:absolute; inset:0; background:rgba(8,10,18,.82); display:none; flex-direction:column; align-items:center;
    justify-content:center; gap:22px; pointer-events:auto; z-index:10; }
  .overlay.show { display:flex; }
  .bigTitle { font-size:32px; font-weight:900; color:#ffd76b; text-shadow:0 3px 0 #a3541b, 0 6px 14px rgba(0,0,0,.5); letter-spacing:2px; }
  .stars { font-size:52px; letter-spacing:6px; filter:drop-shadow(0 4px 6px rgba(0,0,0,.5)); }
  .greenBtn { background:linear-gradient(#7ed95c,#3fa53a); border:none; color:#fff; font-size:19px; font-weight:800; padding:13px 52px;
    border-radius:14px; box-shadow:0 4px 0 #2c7a28; cursor:pointer; }
  .greenBtn:active { transform:translateY(3px); box-shadow:0 1px 0 #2c7a28; }
  .subInfo { color:#fff; background:rgba(255,255,255,.12); padding:6px 16px; border-radius:9px; font-weight:700; }

  .flyIcon { position:absolute; font-size:28px; pointer-events:none; z-index:5; will-change:transform; }
  .sparkle { position:absolute; font-size:16px; pointer-events:none; z-index:6; animation:spark .6s forwards; }
  @keyframes spark { 0%{transform:translate(0,0) scale(1); opacity:1} 100%{transform:translate(var(--dx),var(--dy)) scale(.3); opacity:0} }
</style>
</head>
<body>
<div id="stage">
  <div class="ui">
    <div id="levelLabel">第<b>3</b>关</div>
    <div id="timerPill"><span class="clock"></span><span id="timerText">4:00</span></div>
    <div id="goals"></div>
    <div id="tray"></div>
    <div id="boosters">
      <button class="boost" id="magnetBtn"><span class="ic">🧲</span>磁铁<span class="badge" id="magnetCnt">3</span></button>
      <button class="boost locked"><span class="ic">🎩</span>第5关 🔒</button>
      <button class="boost locked"><span class="ic">🎈</span>第7关 🔒</button>
      <button class="boost locked"><span class="ic">🌀</span>第9关 🔒</button>
      <button id="pauseBtn">⏸</button>
    </div>
    <div id="magnetTip">磁铁最多可收集3个目标物品</div>

    <div class="overlay" id="winOverlay">
      <div class="bigTitle">干得漂亮！</div>
      <div class="stars">⭐⭐⭐</div>
      <div class="subInfo" id="winTime">⏱ 3:30</div>
      <button class="greenBtn" onclick="location.reload()">继续</button>
    </div>
    <div class="overlay" id="loseOverlay">
      <div class="bigTitle" id="loseTitle">空位已用尽！</div>
      <button class="greenBtn" id="clearTrayBtn">清空物品栏 🪙100</button>
      <button class="greenBtn" style="background:linear-gradient(#8a90b0,#5a5f7a); box-shadow:0 4px 0 #41455c" onclick="location.reload()">重新开始</button>
    </div>
  </div>
</div>

<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
  "cannon-es": "https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js"
} }
</script>
<script type="module">
import * as THREE from 'three';
import * as CANNON from 'cannon-es';

/* ---------- layout: portrait stage ---------- */
const stage = document.getElementById('stage');
function fitStage() {
  const W = innerWidth, H = innerHeight, ratio = 0.52;
  let h = H, w = h * ratio;
  if (w > W) { w = W; h = w / ratio; }
  stage.style.width = w + 'px'; stage.style.height = h + 'px';
}
fitStage(); addEventListener('resize', () => { fitStage(); onResize(); });

/* ---------- three ---------- */
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputColorSpace = THREE.SRGBColorSpace;
stage.prepend(renderer.domElement);

const sceneBg = new THREE.Color('#3d4460');
const scene = new THREE.Scene();
scene.background = sceneBg;

const camera = new THREE.PerspectiveCamera(46, 0.52, 0.1, 100);
camera.position.set(0, 10.5, 3.4);
camera.lookAt(0, 0, -0.35);

function onResize() {
  const w = stage.clientWidth, h = stage.clientHeight;
  renderer.setSize(w, h);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  camera.aspect = w / h; camera.updateProjectionMatrix();
}
onResize();

scene.add(new THREE.AmbientLight(0xffffff, 0.75));
const sun = new THREE.DirectionalLight(0xfff2dd, 1.6);
sun.position.set(3, 12, 4);
sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
sun.shadow.camera.left = -5; sun.shadow.camera.right = 5;
sun.shadow.camera.top = 6; sun.shadow.camera.bottom = -6;
scene.add(sun);

const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(30, 30),
  new THREE.MeshStandardMaterial({ color:'#3d4460', roughness:1 })
);
ground.rotation.x = -Math.PI/2;
ground.receiveShadow = true;
scene.add(ground);

/* ---------- physics ---------- */
const world = new CANNON.World({ gravity: new CANNON.Vec3(0, -18, 0) });
world.allowSleep = true;
const groundBody = new CANNON.Body({ type: CANNON.Body.STATIC, shape: new CANNON.Plane() });
groundBody.quaternion.setFromEuler(-Math.PI/2, 0, 0);
world.addBody(groundBody);
// invisible walls to keep the pile inside the camera view
const wallDefs = [
  { pos:[ 2.7,2,0], rot:[0,-Math.PI/2,0] }, { pos:[-2.7,2,0], rot:[0, Math.PI/2,0] },
  { pos:[0,2, 2.6], rot:[0, Math.PI,0]  }, { pos:[0,2,-4.2], rot:[0,0,0] },
];
for (const wdef of wallDefs) {
  const b = new CANNON.Body({ type: CANNON.Body.STATIC, shape: new CANNON.Plane() });
  b.position.set(...wdef.pos);
  b.quaternion.setFromEuler(...wdef.rot);
  world.addBody(b);
}

/* ---------- item factories (procedural, no assets) ---------- */
const M = (color, extra={}) => new THREE.MeshStandardMaterial({ color, roughness:.55, metalness:.05, ...extra });
function makeApple() {
  const g = new THREE.Group();
  const body = new THREE.Mesh(new THREE.SphereGeometry(.36, 24, 20), M('#f05a28'));
  body.scale.y = .9; g.add(body);
  const stem = new THREE.Mesh(new THREE.CylinderGeometry(.03,.04,.16,8), M('#6b4a2b'));
  stem.position.y = .36; g.add(stem);
  const leaf = new THREE.Mesh(new THREE.SphereGeometry(.1, 10, 8), M('#4caf50'));
  leaf.scale.set(1.4,.35,.7); leaf.position.set(.12,.38,0); g.add(leaf);
  return { g, r:.38 };
}
function makeBanana() {
  const g = new THREE.Group();
  const curve = new THREE.Mesh(new THREE.TorusGeometry(.32, .12, 12, 20, Math.PI*1.1), M('#ffc72c'));
  curve.rotation.z = Math.PI*-.05; g.add(curve);
  const tip = new THREE.Mesh(new THREE.SphereGeometry(.11,8,8), M('#8a6d1d'));
  tip.position.set(.32,0,0); g.add(tip);
  return { g, r:.38 };
}
function makeGrape() {
  const g = new THREE.Group();
  const positions = [[0,0,0],[.16,.02,.1],[-.16,.02,.1],[.08,.05,-.14],[-.08,.05,-.14],[0,.18,.06],[.13,.17,-.05],[-.13,.17,-.05],[0,.32,0]];
  for (const p of positions) {
    const b = new THREE.Mesh(new THREE.SphereGeometry(.13, 12, 10), M('#8e44ad'));
    b.position.set(...p); g.add(b);
  }
  return { g, r:.36 };
}
function makeKiwi() {
  const g = new THREE.Group();
  const half = new THREE.Mesh(new THREE.SphereGeometry(.33, 20, 14, 0, Math.PI*2, 0, Math.PI/2), M('#7a5230'));
  g.add(half);
  const flesh = new THREE.Mesh(new THREE.CircleGeometry(.32, 24), M('#8db600'));
  flesh.rotation.x = -Math.PI/2; flesh.position.y = .005; g.add(flesh);
  const core = new THREE.Mesh(new THREE.CircleGeometry(.12, 16), M('#e8efc3'));
  core.rotation.x = -Math.PI/2; core.position.y = .012; g.add(core);
  g.position.y = 0;
  return { g, r:.34 };
}
function makeLeaf() {
  const g = new THREE.Group();
  const blade = new THREE.Mesh(new THREE.SphereGeometry(.34, 14, 10), M('#57a63e'));
  blade.scale.set(1.15,.18,.75); g.add(blade);
  const stem = new THREE.Mesh(new THREE.CylinderGeometry(.025,.025,.3,6), M('#3c7a2a'));
  stem.rotation.z = Math.PI/2; stem.position.x = .45; g.add(stem);
  return { g, r:.33 };
}
function makeFrog() {
  const g = new THREE.Group();
  const body = new THREE.Mesh(new THREE.SphereGeometry(.32, 20, 16), M('#69b64a'));
  body.scale.set(1.1,.85,1); g.add(body);
  const belly = new THREE.Mesh(new THREE.SphereGeometry(.22, 14, 12), M('#e8f2d8'));
  belly.scale.set(1,.7,.8); belly.position.set(0,-.05,.16); g.add(belly);
  for (const s of [-1,1]) {
    const eye = new THREE.Mesh(new THREE.SphereGeometry(.1, 12, 10), M('#7ec95e'));
    eye.position.set(.16*s,.26,.12); g.add(eye);
    const pupil = new THREE.Mesh(new THREE.SphereGeometry(.04, 8, 8), M('#222'));
    pupil.position.set(.16*s,.28,.2); g.add(pupil);
  }
  return { g, r:.36 };
}
const TYPES = {
  apple:  { make: makeApple,  icon:'🍎' },
  banana: { make: makeBanana, icon:'🍌' },
  grape:  { make: makeGrape,  icon:'🍇' },
  kiwi:   { make: makeKiwi,   icon:'🥝' },
  leaf:   { make: makeLeaf,   icon:'🍃' },
  frog:   { make: makeFrog,   icon:'🐸' },
};

/* ---------- level setup ---------- */
const GOALS = { apple:6, grape:3, banana:6 };           // like the reference video
const BOARD = { apple:9, banana:9, grape:6, kiwi:9, leaf:9, frog:9 }; // multiples of 3
const items = [];   // { id, type, mesh, body, state:'board'|'flying'|'gone' }
let nextId = 1;

function spawnAll() {
  const list = [];
  for (const [t, n] of Object.entries(BOARD)) for (let i=0;i<n;i++) list.push(t);
  list.sort(() => Math.random()-.5);
  list.forEach((t, i) => {
    const { g, r } = TYPES[t].make();
    g.traverse(o => { if (o.isMesh) { o.castShadow = true; o.receiveShadow = true; } });
    scene.add(g);
    const body = new CANNON.Body({
      mass: 1, shape: new CANNON.Sphere(r),
      position: new CANNON.Vec3((Math.random()-.5)*4.4, 1.5 + (i%12)*0.75 + Math.random()*.4, (Math.random()-.5)*3.6 - .8),
      linearDamping: .12, angularDamping: .3,
    });
    body.velocity.set((Math.random()-.5)*2.5, 0, (Math.random()-.5)*2.5);
    body.quaternion.setFromEuler(Math.random()*6, Math.random()*6, Math.random()*6);
    body.sleepSpeedLimit = .25; body.sleepTimeLimit = .6;
    world.addBody(body);
    items.push({ id: nextId++, type: t, mesh: g, body, state: 'board' });
  });
}
spawnAll();
window.__dbg = { items, world, camera };

/* ---------- UI: goals / tray / timer ---------- */
const goalsEl = document.getElementById('goals');
const goalState = { ...GOALS };
function renderGoals() {
  goalsEl.innerHTML = '';
  for (const [t, n] of Object.entries(goalState)) {
    const d = document.createElement('div');
    d.className = 'goalCard' + (n<=0 ? ' done' : '');
    d.dataset.type = t;
    d.innerHTML = `<span class="cnt"><span>${Math.max(n,0)}</span></span>${TYPES[t].icon}`;
    goalsEl.appendChild(d);
  }
}
renderGoals();

const trayEl = document.getElementById('tray');
const SLOTS = 7;
let tray = []; // array of type strings
function renderTray(popIdx = []) {
  trayEl.innerHTML = '';
  for (let i=0;i<SLOTS;i++) {
    const s = document.createElement('div');
    s.className = 'slot' + (popIdx.includes(i) ? ' pop' : '');
    if (tray[i]) s.innerHTML = `<span class="item">${TYPES[tray[i]].icon}</span>`;
    trayEl.appendChild(s);
  }
}
renderTray();

let timeLeft = 240, gameOver = false;
const timerText = document.getElementById('timerText');
setInterval(() => {
  if (gameOver) return;
  timeLeft--;
  timerText.textContent = `${Math.floor(timeLeft/60)}:${String(timeLeft%60).padStart(2,'0')}`;
  if (timeLeft <= 0) fail('时间到！');
}, 1000);

/* ---------- collect flow ---------- */
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();
let busyCount = 0; // items currently flying

renderer.domElement.addEventListener('pointerdown', e => {
  if (gameOver) return;
  const rect = renderer.domElement.getBoundingClientRect();
  pointer.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  pointer.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(pointer, camera);
  const meshes = items.filter(it => it.state === 'board').map(it => it.mesh);
  const hits = raycaster.intersectObjects(meshes, true);
  if (!hits.length) return;
  let obj = hits[0].object;
  while (obj.parent && !items.some(it => it.mesh === obj)) obj = obj.parent;
  const item = items.find(it => it.mesh === obj);
  if (item) collectItem(item);
});

function slotScreenPos(idx) {
  const rect = trayEl.getBoundingClientRect();
  const stageRect = stage.getBoundingClientRect();
  const slotW = rect.width / SLOTS;
  return { x: rect.left - stageRect.left + slotW*(idx+.5), y: rect.top - stageRect.top + rect.height/2 };
}

function collectItem(item) {
  if (tray.length >= SLOTS) return;
  item.state = 'flying';
  world.removeBody(item.body);
  busyCount++;
  // decide insert position: after last same type
  let insertAt = tray.length;
  for (let i=tray.length-1;i>=0;i--) if (tray[i]===item.type) { insertAt = i+1; break; }
  tray.splice(insertAt, 0, item.type);
  renderTray();
  // fly the 3D mesh toward the slot's world-space point
  const sp = slotScreenPos(insertAt);
  const ndc = new THREE.Vector2(
    (sp.x / stage.clientWidth) * 2 - 1,
    -(sp.y / stage.clientHeight) * 2 + 1
  );
  const ray = new THREE.Raycaster();
  ray.setFromCamera(ndc, camera);
  const target = ray.ray.at(9, new THREE.Vector3());
  const from = item.mesh.position.clone();
  const start = performance.now(), dur = 340;
  (function fly(now) {
    const t = Math.min((now - start) / dur, 1);
    const k = t*t*(3-2*t);
    item.mesh.position.lerpVectors(from, target, k);
    item.mesh.position.y += Math.sin(t*Math.PI) * 1.2;
    const s = 1 - .6*k;
    item.mesh.scale.setScalar(s);
    if (t < 1) requestAnimationFrame(fly);
    else {
      scene.remove(item.mesh);
      item.state = 'gone';
      busyCount--;
      landInTray(item.type);
    }
  })(start);
}

function landInTray(type) {
  // goal progress counts per collected item
  if (goalState[type] !== undefined && goalState[type] > 0) {
    goalState[type]--;
    renderGoals();
    const card = goalsEl.querySelector(`[data-type="${type}"]`);
    if (card) { card.classList.add('pulse'); setTimeout(()=>card.classList.remove('pulse'), 160); }
  }
  // triple check
  const idxs = [];
  tray.forEach((t,i) => { if (t===type) idxs.push(i); });
  if (idxs.length >= 3) {
    const kill = idxs.slice(0,3);
    renderTray(kill);
    sparkleAt(slotScreenPos(kill[1]));
    setTimeout(() => {
      tray = tray.filter((_,i) => !kill.includes(i));
      renderTray();
      checkEnd();
    }, 320);
  } else {
    renderTray();
    checkEnd();
  }
}

function checkEnd() {
  if (gameOver) return;
  if (busyCount > 0) return;
  if (Object.values(goalState).every(v => v <= 0)) {
    gameOver = true;
    document.getElementById('winTime').textContent = '⏱ ' + timerText.textContent;
    document.getElementById('winOverlay').classList.add('show');
    return;
  }
  if (tray.length >= SLOTS) fail('空位已用尽！');
}

function fail(title) {
  if (gameOver) return;
  gameOver = true;
  document.getElementById('loseTitle').textContent = title;
  document.getElementById('loseOverlay').classList.add('show');
}
document.getElementById('clearTrayBtn').addEventListener('click', () => {
  tray = []; renderTray();
  gameOver = false;
  document.getElementById('loseOverlay').classList.remove('show');
});

function sparkleAt(p) {
  for (let i=0;i<6;i++) {
    const s = document.createElement('div');
    s.className = 'sparkle'; s.textContent = '✨';
    s.style.left = p.x + 'px'; s.style.top = p.y + 'px';
    s.style.setProperty('--dx', (Math.random()-.5)*90 + 'px');
    s.style.setProperty('--dy', (Math.random()-.5)*90 - 30 + 'px');
    stage.querySelector('.ui').appendChild(s);
    setTimeout(() => s.remove(), 650);
  }
}

/* ---------- magnet booster ---------- */
let magnetUses = 3, tipShown = false;
const magnetBtn = document.getElementById('magnetBtn');
const magnetTip = document.getElementById('magnetTip');
magnetBtn.addEventListener('click', () => {
  if (gameOver || magnetUses <= 0) return;
  if (!tipShown) {
    tipShown = true;
    magnetTip.style.opacity = 1;
    setTimeout(() => magnetTip.style.opacity = 0, 1800);
  }
  const targetType = Object.keys(goalState).find(t =>
    goalState[t] > 0 && items.some(it => it.state==='board' && it.type===t));
  if (!targetType) return;
  const picks = items.filter(it => it.state==='board' && it.type===targetType).slice(0, 3);
  const room = SLOTS - tray.length;
  if (room <= 0) return;
  magnetUses--;
  document.getElementById('magnetCnt').textContent = magnetUses;
  picks.slice(0, Math.min(3, room)).forEach((it, i) => setTimeout(() => {
    if (it.state === 'board' && !gameOver) collectItem(it);
  }, i * 180));
});

/* ---------- main loop ---------- */
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), .05);
  world.step(1/60, dt, 3);
  for (const it of items) {
    if (it.state !== 'board') continue;
    it.mesh.position.copy(it.body.position);
    it.mesh.quaternion.copy(it.body.quaternion);
  }
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
