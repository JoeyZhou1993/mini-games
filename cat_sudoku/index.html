<!DOCTYPE html>
<html lang="en">

<title>Find the Cats</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; -webkit-user-select:none; -webkit-touch-callout:none; }

  body {
    background: radial-gradient(130% 100% at 50% 0%, #f6ecfe 0%, #eeddfb 55%, #e4cdf7 100%);
    font-family: -apple-system, "PingFang SC", "Helvetica Neue", Arial, sans-serif;

    padding: max(env(safe-area-inset-top), 18px) env(safe-area-inset-right) max(env(safe-area-inset-bottom), 10px) env(safe-area-inset-left);
  }
  #game { width:var(--gw); position:relative; }

  /* 状态行: 猫计数 + 鱼干生命 */
  #status { display:flex; align-items:center; justify-content:space-between; padding:0 6px 10px; }
  .pill { background:#fff; border-radius:16px; padding:6px 16px; font-weight:800; color:#6b4a96;
    font-size:clamp(14px,4vw,17px); box-shadow:0 3px 0 #dcc8f2, 0 4px 8px rgba(150,110,200,.2); }

  #board { display:grid; aspect-ratio:1; gap:4px; position:relative; }

  .sq.cat { box-shadow:inset 0 -3px 0 rgba(0,0,0,.08), inset 0 2px 0 rgba(255,255,255,.5), 0 0 0 3px #ffd54d, 0 0 14px rgba(255,200,60,.75); z-index:2; }

  #overCard .bigcat { font-size:clamp(52px,15vw,74px); animation:catBounce 1s ease infinite alternate; }

  #overCard h2 { font-size:clamp(22px,6.4vw,30px); margin:8px 0 6px; }
  #overCard .sub { color:#a58bc8; font-size:clamp(13px,3.8vw,16px); margin-bottom:22px; }

    padding:10px 26px; border-radius:22px; opacity:0; pointer-events:none; z-index:100; transition:all .25s ease; }

<script>
/* ================= App桥 / 存储 / Toast(底座) ================= */
const bridge={
  fullScreen(on){ try{ if(window.android&&window.android.setFullScreen) window.android.setFullScreen(!!on); }catch(e){} },
  exit(){ bridge.fullScreen(false);
    try{ if(window.android&&window.android.exitGame){ window.android.exitGame(); return; } }catch(e){}
    showToast('Exit'); },
  stat(event,params){ try{ if(window.android&&window.android.statistics) window.android.statistics(JSON.stringify({event,params:params||{}})); }catch(e){} }
};
bridge.fullScreen(true);
bridge.stat('pv_h5',{page_name:'findcat'});   // 页面PV
const store={
  get(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } },
  set(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }
};
let toastTimer=null;
function showToast(txt){
  const t=document.getElementById('toast');
  t.textContent=txt; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),1600);
}
if(location.search.includes('reset')){
  try{ localStorage.removeItem('cs_level'); localStorage.removeItem('cs_tut'); localStorage.removeItem('cs_hints'); }catch(e){}
  history.replaceState(null,'',location.pathname);
}

/* ================= 音效 ================= */
let AC=null, MASTER=null;
function tone(f,dur,opt={}){ try{
  const {type='sine',vol=0.22,at=0.008,slide=null,delay=0}=opt;
  AC=AC||new (window.AudioContext||window.webkitAudioContext)();
  if(!MASTER){ const c=AC.createDynamicsCompressor(); c.threshold.value=-18; c.ratio.value=6; c.connect(AC.destination);
    MASTER=AC.createGain(); MASTER.gain.value=1.7; MASTER.connect(c); }
  if(AC.state==='suspended') AC.resume();
  const t0=AC.currentTime+delay;
  const o=AC.createOscillator(), g=AC.createGain();
  o.type=type; o.frequency.setValueAtTime(f,t0);
  if(slide) o.frequency.exponentialRampToValueAtTime(slide,t0+dur);
  g.gain.setValueAtTime(0,t0); g.gain.linearRampToValueAtTime(vol,t0+at);
  g.gain.exponentialRampToValueAtTime(0.001,t0+dur);
  o.connect(g); g.connect(MASTER); o.start(t0); o.stop(t0+dur+0.03);
}catch(e){} }
const SC=[523.25,659.25,783.99,1046.5,1318.5];
const sndTap=()=>tone(600,0.05,{vol:0.14});
const sndCat=()=>{ tone(SC[2],0.14,{type:'triangle',vol:0.35}); tone(SC[4],0.2,{vol:0.22,delay:0.07}); };
const sndErr=()=>{ tone(180,0.12,{type:'triangle',vol:0.28}); tone(130,0.16,{type:'triangle',vol:0.26,delay:0.1}); };
const sndHint=()=>{ tone(880,0.1,{vol:0.25}); tone(1174,0.16,{vol:0.2,delay:0.09}); };
const sndWin=()=>{ [0,1,2,3,4].forEach(i=>{ tone(SC[i],0.26,{type:'triangle',vol:0.35,delay:i*0.1}); tone(SC[i]*2,0.16,{vol:0.1,delay:i*0.1}); }); tone(2093,0.5,{vol:0.13,delay:0.55}); };
const sndLose=()=>{ tone(330,0.35,{type:'triangle',vol:0.28}); tone(247,0.5,{type:'triangle',vol:0.24,delay:0.22}); };
const vib=p=>{ try{ navigator.vibrate&&navigator.vibrate(p); }catch(e){} };

/* ================= 谜题核心(压测: 全尺寸<1ms, 零失败) ================= */
function genCats(N){
  const cols=[];
  const shuffled=a=>a.sort(()=>Math.random()-.5);
  function place(r){
    if(r===N) return true;
    for(const c of shuffled([...Array(N).keys()])){
      if(cols.includes(c)) continue;
      if(r>0 && Math.abs(cols[r-1]-c)<=1) continue;
      cols[r]=c;
      if(place(r+1)) return true;
      cols.length=r;
    }
    return false;
  }
  return place(0)? cols : null;
}
function genRegions(N,cats){
  const region=Array(N*N).fill(-1), frontier=[];
  cats.forEach((c,r)=>{ region[r*N+c]=r; frontier.push([r,c,r]); });
  while(frontier.length){
    const i=~~(Math.random()*frontier.length);
    const [r,c,id]=frontier[i];
    const dirs=[[1,0],[-1,0],[0,1],[0,-1]].sort(()=>Math.random()-.5);
    let grew=false;
    for(const [dr,dc] of dirs){
      const nr=r+dr,nc=c+dc;
      if(nr<0||nc<0||nr>=N||nc>=N||region[nr*N+nc]>=0) continue;
      region[nr*N+nc]=id; frontier.push([nr,nc,id]); grew=true; break;
    }
    if(!grew) frontier.splice(i,1);
  }
  return region;
}
/* 求解器: 找与 fixed(已放猫 {row:col}) 兼容的完整解 */
function solveCompat(N,region,fixed){
  const usedC=Array(N).fill(false), usedR=Array(N).fill(false), rows=Array(N).fill(-1);
  for(const r in fixed){ const c=fixed[r]; usedC[c]=true; usedR[region[r*N+c]]=true; rows[+r]=c; }
  function adjOK(r,c){
    for(let dr=-1;dr<=1;dr++){ const rr=r+dr; if(rr<0||rr>=N||rows[rr]<0||rr===r) continue;
      if(Math.abs(rows[rr]-c)<=1) return false; }
    return true;
  }
  function bt(r){
    if(r===N) return true;
    if(rows[r]>=0) return bt(r+1);
    for(let c=0;c<N;c++){
      if(usedC[c]) continue;
      const id=region[r*N+c]; if(usedR[id]) continue;
      if(!adjOK(r,c)) continue;
      usedC[c]=usedR[id]=true; rows[r]=c;
      if(bt(r+1)) return true;
      usedC[c]=usedR[id]=false; rows[r]=-1;
    }
    return false;
  }
  return bt(0)? rows.slice():null;
}

/* ================= 游戏状态 ================= */
/* 10 色, 按色相排序且刻意只保留 1 绿 1 青, 避免"满屏绿" */
const PALETTE=['#f77e6e','#f7a84c','#efc93f','#84cc62','#45c6b6','#67b4f0','#8093ea','#b884e3','#e884ce','#f593ac'];
/*              珊瑚红     橙        黄         绿(唯一)  青(唯一)  天蓝      蓝紫      紫        品红      粉      */
const boardEl=document.getElementById('board');
let level=1, N=5, region=[], regionColor=[], cells=[], state=[], fish=3, playing=true;
/* state: 0=空 1=✕ 2=😺 */

/* 区域上色: 颜色全局唯一(一种颜色=一个区域, 规则才自洽), 且相邻区域色相尽量拉开 */
function assignColors(N,region){
  const R=N, P=PALETTE.length;   /* R<=9 < P=10, 颜色够每区唯一 */
  const adj=Array.from({length:R},()=>new Set());
  for(let i=0;i<N*N;i++){
    const r=~~(i/N), c=i%N;
    if(c+1<N && region[i]!==region[i+1]){ adj[region[i]].add(region[i+1]); adj[region[i+1]].add(region[i]); }
    if(r+1<N && region[i]!==region[i+N]){ adj[region[i]].add(region[i+N]); adj[region[i+N]].add(region[i]); }
  }
  const cidx=Array(R).fill(-1), taken=Array(P).fill(false);
  const circ=(a,b)=>{ const d=Math.abs(a-b); return Math.min(d,P-d); };   /* 色相环距离(色板已按色相排序) */
  const order=[...Array(R).keys()].sort((x,y)=>adj[y].size-adj[x].size);  /* 邻居最多的先上色 */
  for(const rg of order){
    const used=[...adj[rg]].map(n=>cidx[n]).filter(v=>v>=0);
    let best=-1, bestScore=-1;
    for(let p=0;p<P;p++){
      if(taken[p]) continue;                                              /* 已用颜色跳过 → 全局唯一 */
      const minD=used.length? Math.min(...used.map(u=>circ(p,u))) : P;    /* 与已上色邻居的最小色相距离 */
      if(minD>bestScore){ bestScore=minD; best=p; }
    }
    cidx[rg]=best; taken[best]=true;
  }
  return cidx.map(p=>PALETTE[p]);
}

function levelN(L){ return Math.min(5+~~((L-1)/3), 9); }
function newLevel(){
  N=levelN(level);
  const cats=genCats(N);
  region=genRegions(N,cats);
  regionColor=assignColors(N,region);
  state=Array(N*N).fill(0);
  fish=3; playing=true;
  document.getElementById('level').textContent='LEVEL '+level;
  document.getElementById('over').classList.remove('show');
  boardEl.style.gridTemplateColumns=`repeat(${N},1fr)`;
  boardEl.style.gridTemplateRows=`repeat(${N},1fr)`;
  boardEl.innerHTML=''; cells=[];
  for(let i=0;i<N*N;i++){
    const d=document.createElement('div'); d.className='sq';
    d.style.background=regionColor[region[i]];
    d.style.fontSize=`calc(var(--gw)/${N+3})`;
    const m=document.createElement('span'); m.className='mark'; d.appendChild(m);
    d.addEventListener('click',()=>tapCell(i));
    boardEl.appendChild(d); cells.push(d);
  }
  render();
}
function render(){
  for(let i=0;i<N*N;i++){
    const el=cells[i], st=state[i];
    el.querySelector('.mark').textContent = st===1?'✕': st===2?'😺':'';
    el.classList.toggle('cat', st===2);
  }
  const catN=state.filter(s=>s===2).length;
  document.getElementById('catCount').textContent=`😺 ${catN}/${N}`;
  document.querySelectorAll('#fish .f').forEach((f,i)=>f.classList.toggle('lost', i>=fish));
}
/* 放猫规则校验: 违规返回原因, 合法返回null */
function violation(i){
  const r=~~(i/N), c=i%N;
  for(let k=0;k<N*N;k++){
    if(state[k]!==2||k===i) continue;
    const kr=~~(k/N), kc=k%N;
    if(kr===r) return 'row';
    if(kc===c) return 'column';
    if(region[k]===region[i]) return 'color area';
    if(Math.abs(kr-r)<=1&&Math.abs(kc-c)<=1) return 'touch zone';
  }
  return null;
}
function tapCell(i){
  if(!playing) return;
  /* 引导实操步: 只允许点发光的解位格, 保证跟着做必成功 */
  if(tutorialActive){
    if(tutStep!==TUT_TOTAL-1 || i!==GATE()){ showToast('👆 Tap the glowing cell'); return; }
  }
  const st=state[i];
  if(st===0){ state[i]=1; sndTap(); render(); }
  else if(st===1){
    const why=violation(i);
    if(why){
      sndErr(); vib([50,60,50]); fish--;
      cells[i].classList.add('err'); setTimeout(()=>cells[i].classList.remove('err'),450);
      render();
      if(fish<=0){ lose(); return; }
      showToast(`Cats conflict: same ${why}! 🙀`);
    } else {
      state[i]=2; sndCat(); vib(12);
      autoMark(i);
      render();
      if(tutorialActive) endTutorial(true);
      checkWin();
    }
  }
  else { state[i]=0; sndTap(); render(); }   /* 撤猫(自动✕保留可手动清) */
}
/* 放对猫后: 自动给行/列/同区/8邻的空格标✕ */
function autoMark(i){
  const r=~~(i/N), c=i%N;
  for(let k=0;k<N*N;k++){
    if(state[k]!==0||k===i) continue;
    const kr=~~(k/N), kc=k%N;
    if(kr===r||kc===c||region[k]===region[i]||(Math.abs(kr-r)<=1&&Math.abs(kc-c)<=1)) state[k]=1;
  }
}
function checkWin(){
  if(state.filter(s=>s===2).length!==N) return;
  playing=false;
  sndWin(); vib([50,60,50,60,80]);
  const catsEmo=['😺','😸','😻','🐱','😽','🐈'];
  for(let k=0;k<14;k++){
    const el=document.createElement('div'); el.className='catRain'; el.textContent=catsEmo[k%catsEmo.length];
    el.style.left=(5+Math.random()*90)+'%'; el.style.top='-40px';
    el.style.animationDelay=(Math.random()*0.9)+'s';
    document.getElementById('game').appendChild(el);
    setTimeout(()=>el.remove(),3400);
  }
  document.getElementById('overTitle').textContent=`Level ${level} complete!`;
  document.getElementById('overSub').textContent='All cats found! 🐾';
  document.getElementById('nextBtn').textContent='Next Level';
  level++; store.set('cs_level',level);
  if(hints<HINT_MAX){ hints++; store.set('cs_hints',hints); renderHints(); }   /* 过关回补1次 */
  setTimeout(()=>document.getElementById('over').classList.add('show'),900);
}
function lose(){
  playing=false; sndLose(); vib(90);
  document.getElementById('overTitle').textContent='Out of fish! 🐟';
  document.getElementById('overSub').textContent="Don't worry — try again!";
  document.getElementById('nextBtn').textContent='Try Again';
  document.querySelector('#overCard .bigcat').textContent='🙀';
  setTimeout(()=>document.getElementById('over').classList.add('show'),600);
}
document.getElementById('exitBtn').addEventListener('click',()=>{ bridge.exit(); });
document.getElementById('nextBtn').addEventListener('click',()=>{
  bridge.stat('h5_click',{game_name:'findcat', page_name:'restart'});
  document.querySelector('#overCard .bigcat').textContent='😻';
  newLevel();
});
document.getElementById('resetBtn').addEventListener('click',()=>{ if(tutorialActive) return; sndTap(); newLevel(); });
/* Hint 全局余额: 初始5, 过关+1, 上限5 */
const HINT_MAX=5;
let hints=store.get('cs_hints')===null? HINT_MAX : Math.max(0,Math.min(HINT_MAX,+store.get('cs_hints')||0));
function renderHints(){
  document.getElementById('hintCnt').textContent=hints;
  document.getElementById('hintBtn').classList.toggle('empty',hints<=0);
}
document.getElementById('hintBtn').addEventListener('click',()=>{
  if(!playing||tutorialActive) return;
  if(hints<=0){ showToast('No hints left — beat a level to earn one! 💡'); return; }
  const fixed={};
  for(let i=0;i<N*N;i++) if(state[i]===2) fixed[~~(i/N)]=i%N;
  const sol=solveCompat(N,region,fixed);
  if(!sol){ showToast('No solution from here — restart! 🙀'); return; }
  const r=sol.findIndex((c,rr)=>state[rr*N+c]!==2);
  if(r<0) return;
  const i=r*N+sol[r];
  state[i]=2; autoMark(i);
  hints--; store.set('cs_hints',hints); renderHints();   /* 真正放猫才扣次数 */
  sndHint(); vib(15);
  render(); checkWin();
});
document.getElementById('restart').addEventListener('click',e=>{ e.stopPropagation(); bridge.exit(); });

/* ================= 分步新手引导(状态机 + spotlight) ================= */
let tutorialActive=false, tutStep=-1, demoR=0, demoC0=0;
const TUT_TOTAL=5;              /* step 0..4 */
const GATE=()=>demoR*N+demoC0;  /* 实操步唯一可点格=中间行的猫解位(避开顶部教学条) */

function clearPaint(){
  cells.forEach(el=>{ el.classList.remove('spot','spot-c','spot-line','spot-bad');
    const d=el.querySelector('.demo'); if(d) d.remove(); });
}
function paintCell(idx,cls,emoji){
  const el=cells[idx]; el.classList.add(cls);
  if(emoji){ let d=el.querySelector('.demo'); if(!d){ d=document.createElement('span'); d.className='demo'; el.appendChild(d); }
    d.textContent=emoji; d.style.fontSize=`calc(var(--gw)/${N+3})`; }
}
/* 每步定义: icon/tip/sub/是否实操步op/高亮画法 */
const TUT=[
  { icon:'😺', tip:"Let's learn how to find the hidden cats!", sub:'Just 3 simple rules 🐾',
    draw(){} },
  { icon:'🎨', tip:'Rule 1 — Each COLOR block holds exactly 1 cat.', sub:'This whole color = one cat only',
    draw(){ const cid=region[GATE()];
      for(let i=0;i<N*N;i++) if(region[i]===cid) paintCell(i,'spot-c', i===GATE()?'😺':''); } },
  { icon:'↔️', tip:'Rule 2 — Only 1 cat per row AND per column.', sub:'Never two cats in the same line',
    draw(){ for(let c=0;c<N;c++) paintCell(demoR*N+c,'spot-line', c===demoC0?'😺':'');
      for(let r=0;r<N;r++) if(r!==demoR) paintCell(r*N+demoC0,'spot-line',''); } },
  { icon:'🚫', tip:"Rule 3 — Cats can't touch. Not even corners!", sub:'No cat allowed in any red cell',
    draw(){ paintCell(GATE(),'spot','😺');
      for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){ if(!dr&&!dc) continue;
        const r=demoR+dr,c=demoC0+dc; if(r<0||c<0||r>=N||c>=N) continue; paintCell(r*N+c,'spot-bad','✕'); } } },
  { icon:'👆', tip:'Tap once = ✕ mark. Tap the SAME cell twice = 😺 cat.', sub:'Try it — place your first cat!', op:true,
    draw(){ paintCell(GATE(),'spot',''); } },
];

let tutTimer=null;
function tutLoop(){ clearInterval(tutTimer);
  tutTimer=setInterval(()=>{ if(tutorialActive&&tutStep===TUT_TOTAL-1) positionFinger(); else clearInterval(tutTimer); },600); }
function positionFinger(){
  if(tutStep!==TUT_TOTAL-1) return;
  const g=document.getElementById('game').getBoundingClientRect();
  const rect=cells[GATE()].getBoundingClientRect();
  const f=document.getElementById('tutFinger');
  f.style.left=(rect.left+rect.width/2-g.left-13)+'px';
  f.style.top=(rect.top+rect.height/2-g.top-4)+'px';
}
function setDots(step){
  const box=document.getElementById('coachDots'); box.innerHTML='';
  for(let i=0;i<TUT_TOTAL;i++){ const d=document.createElement('div'); d.className='dot'+(i===step?' on':''); box.appendChild(d); }
}
function gotoStep(n){
  tutStep=n; clearPaint();
  const step=TUT[n], coach=document.getElementById('coach'), next=document.getElementById('coachNext');
  document.getElementById('coachIcon').textContent=step.icon;
  document.getElementById('coachTip').textContent=step.tip;
  document.getElementById('coachSub').textContent=step.sub||'';
  setDots(n); step.draw();
  if(step.op){
    coach.classList.add('pass'); next.classList.add('wait');
    document.getElementById('tut').classList.add('show');
    positionFinger(); tutLoop();
  } else {
    coach.classList.remove('pass'); next.classList.remove('wait');
    next.textContent = (n===TUT_TOTAL-2)? 'Got it! →' : 'Next →';
    document.getElementById('tut').classList.remove('show');
  }
  sndTap();
}
function setupTutorial(){
  if(store.get('cs_tut')) return;
  const sol=solveCompat(N,region,{}); if(!sol) return;
  demoR=~~(N/2); demoC0=sol[demoR]; tutorialActive=true;   /* 中间行演示, 不被顶部教学条遮挡 */
  document.getElementById('coach').classList.add('show');
  gotoStep(0);
}
document.getElementById('coachNext').addEventListener('click',()=>{
  if(tutStep<TUT_TOTAL-1) gotoStep(tutStep+1);
});
function endTutorial(grad){
  document.getElementById('tut').classList.remove('show');
  document.getElementById('coach').classList.remove('show','pass');
  clearInterval(tutTimer); clearPaint(); render();
  if(grad){ tutorialActive=false; store.set('cs_tut','1'); showToast('Purrfect! You got it 😸'); }
}
window.addEventListener('resize',()=>{ if(tutorialActive) setTimeout(positionFinger,80); });

level=(+store.get('cs_level'))||1;
newLevel();
renderHints();
setupTutorial();
/* 供测试 */
window.__cs={get N(){return N}, get state(){return state}, get region(){return region},
  get fish(){return fish}, get level(){return level}, set level(v){level=v},
  violation, solveCompat, newLevel, genCats, genRegions, tapCell};
</script>
