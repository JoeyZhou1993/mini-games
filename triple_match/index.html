<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="description" content="Triple Match — collect three of a kind, clear them all!">
<meta name="theme-color" content="#4a5aa8">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Triple Match</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; -webkit-user-select:none; -webkit-touch-callout:none; }
  html,body { height:100%; overflow:hidden; }
  :root { --gw: min(96vw, 54vh); }
  body {
    background: linear-gradient(180deg, #8fd3f2 0%, #b8e4f7 38%, #ffe9cf 78%, #ffd9a8 100%);
    font-family: -apple-system, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
    display:flex; align-items:center; justify-content:center;
    touch-action:manipulation; position:relative;
    padding: max(env(safe-area-inset-top), 18px) env(safe-area-inset-right) max(env(safe-area-inset-bottom), 10px) env(safe-area-inset-left);
  }
  /* 云朵 */
  body::before, body::after { content:''; position:fixed; border-radius:50%; background:rgba(255,255,255,.75);
    filter:blur(2px); z-index:0; pointer-events:none; }
  body::before { width:34vw; height:10vw; left:6vw; top:9vh; box-shadow:12vw 3vw 0 -1vw rgba(255,255,255,.6); }
  body::after { width:28vw; height:9vw; right:4vw; top:22vh; box-shadow:-16vw 6vw 0 -2vw rgba(255,255,255,.55); }
  #game { width:var(--gw); position:relative; z-index:1; }

  #topbar { display:flex; align-items:center; justify-content:space-between; padding:2px 4px 10px; }
  #title { color:#2e5f7a; font-weight:800; font-size:clamp(17px,4.6vw,22px); text-shadow:0 1px 0 rgba(255,255,255,.6); }
  #level { color:#fff; font-weight:800; font-size:clamp(13px,3.8vw,16px);
    background:linear-gradient(180deg,#58c6f2,#2f9ad6); padding:7px 18px; border-radius:20px;
    box-shadow:0 3px 0 #1f78ab, 0 4px 8px rgba(40,120,170,.35); }
  #restart { border:none; cursor:pointer; width:clamp(34px,8.5vw,42px); height:clamp(34px,8.5vw,42px); border-radius:50%;
    background:#fff; color:#4b7c96; font-size:clamp(17px,4.5vw,22px); font-weight:800; line-height:1;
    box-shadow:0 3px 0 #c3d9e6, 0 4px 8px rgba(60,120,160,.25); }
  #restart:active { transform:translateY(2px); box-shadow:0 1px 0 #c3d9e6; }

  /* 场地: 透明, 牌直接铺在风景上 */
  #field { position:relative; width:100%; aspect-ratio:0.92; }
  .tile { position:absolute; display:flex; align-items:center; justify-content:center; cursor:pointer;
    background:linear-gradient(180deg,#ffffff,#eef2f8); border-radius:16%;
    box-shadow:0 4px 0 #b9c6d9, 0 6px 10px rgba(70,100,140,.3), inset 0 1px 0 #fff;
    transition:left .28s cubic-bezier(.4,.1,.3,1), top .28s cubic-bezier(.4,.1,.3,1), width .28s, height .28s, filter .15s, background .15s; }
  .tile.blocked { filter:brightness(.72) saturate(.45); cursor:default;
    background:linear-gradient(180deg,#cfd9e8,#b6c3d8); }
  .tile.inbar { box-shadow:0 2px 0 #b9c6d9, 0 3px 6px rgba(70,100,140,.25); }
  .tile.popout { animation:popout .3s ease forwards; }
  @keyframes popout { 40%{transform:scale(1.25); filter:brightness(1.6);} 100%{transform:scale(.1); opacity:0; filter:brightness(2);} }
  .tile.shake { animation:tshake .3s ease; }
  @keyframes tshake { 25%{transform:translateX(-4px);} 50%{transform:translateX(4px);} 75%{transform:translateX(-2px);} }

  /* 收纳栏: 白色圆角托盘 */
  #barwrap { margin-top:14px; background:#fff; border-radius:16px; padding:8px;
    box-shadow:0 5px 0 #c3cfe0, 0 8px 16px rgba(70,100,140,.28); }
  #bar { display:flex; gap:4px; justify-content:center; position:relative; }
  .slot { flex:1; aspect-ratio:1; background:#e6ebf4; border-radius:10px; box-shadow:inset 0 2px 4px rgba(100,120,160,.25); }
  #barwrap.warn { animation:barWarn .7s ease-in-out infinite alternate; }
  @keyframes barWarn { from{box-shadow:0 5px 0 #c3cfe0, 0 8px 16px rgba(70,100,140,.28);} to{box-shadow:0 5px 0 #d98a80, 0 0 22px rgba(230,90,70,.55);} }

  /* 新手引导 */
  #tut { position:absolute; inset:0; z-index:45; pointer-events:none; display:none; }
  #tut.show { display:block; }
  #tutFinger { position:absolute; font-size:clamp(34px,9vw,46px); filter:drop-shadow(0 3px 4px rgba(0,0,0,.3));
    animation:tutTap 1.1s ease-in-out infinite; will-change:left,top; transition:left .3s, top .3s; }
  @keyframes tutTap { 0%,100%{transform:translateY(0) scale(1);} 45%{transform:translateY(6px) scale(.86);} 60%{transform:translateY(0) scale(1);} }
  #tutTip { position:absolute; left:50%; transform:translateX(-50%); top:var(--tipy,20%);
    background:#fff; color:#2e5f7a; font-weight:800; font-size:clamp(14px,4vw,18px);
    padding:9px 20px; border-radius:20px; box-shadow:0 4px 12px rgba(70,100,140,.3); white-space:nowrap; }

  /* 弹窗: 白卡 */
  #over { position:absolute; inset:-6px; z-index:60; display:none; align-items:center; justify-content:center; border-radius:12px; background:rgba(220,235,246,.72); backdrop-filter:blur(4px); }
  #over.show { display:flex; animation:fadeIn .3s ease; }
  @keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
  #overCard { text-align:center; color:#2e5f7a; padding:30px 38px; background:#fff; border-radius:22px;
    box-shadow:0 10px 30px rgba(70,100,140,.3); animation:cardIn .38s cubic-bezier(.34,1.4,.64,1); }
  @keyframes cardIn { from{transform:scale(.72); opacity:0;} to{transform:scale(1); opacity:1;} }
  #overCard .big { font-size:clamp(52px,15vw,74px); }
  #overCard h2 { font-size:clamp(22px,6.4vw,30px); margin:8px 0 6px; }
  #overCard .sub { color:#7fa3b8; font-size:clamp(13px,3.8vw,16px); margin-bottom:22px; }
  #nextBtn { border:none; cursor:pointer; font-size:clamp(16px,4.6vw,20px); font-weight:800; color:#fff; padding:13px 42px; border-radius:14px;
    background:linear-gradient(180deg,#ffb340,#ff8c1a); box-shadow:0 5px 0 #c96a08, 0 8px 14px rgba(200,120,20,.35); }
  #nextBtn:active { transform:translateY(3px); box-shadow:0 2px 0 #c96a08; }

  #toast { position:fixed; left:50%; bottom:12%; transform:translateX(-50%) translateY(16px);
    background:rgba(46,95,122,.94); color:#fff; font-weight:700; font-size:clamp(13px,3.8vw,16px);
    padding:10px 26px; border-radius:22px; opacity:0; pointer-events:none; z-index:100; transition:all .25s ease; }
  #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  #rotate { display:none; position:fixed; inset:0; z-index:99; background:#b8e4f7; color:#2e5f7a;
    font-size:clamp(16px,3vh,22px); font-weight:800; text-align:center;
    align-items:center; justify-content:center; flex-direction:column; gap:14px; }
  #rotate .ph { font-size:44px; }
  @media (orientation:landscape) and (max-height:520px) { #rotate { display:flex; } }
</style>
</head>
<body>
<div id="game">
  <div id="topbar">
    <div id="title">🧺 Triple Match</div>
    <div id="level">LEVEL 1</div>
    <button id="restart" title="Exit">✕</button>
  </div>
  <div id="field"></div>
  <div id="tut"><div id="tutTip">Tap 3 matching items!</div><div id="tutFinger">👆</div></div>
  <div id="barwrap"><div id="bar">
    <div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div>
    <div class="slot"></div><div class="slot"></div><div class="slot"></div>
  </div></div>
  <div id="over"><div id="overCard">
    <div class="big" id="overIcon">🎉</div>
    <h2 id="overTitle">Level 1 complete!</h2>
    <div class="sub" id="overSub"></div>
    <button id="nextBtn">Next Level</button>
  </div></div>
</div>
<div id="toast"></div>
<div id="rotate"><div class="ph">📱</div><div>Rotate to portrait</div></div>

<script>
/* ================= App桥 / 存储 / Toast(同底座) ================= */
const bridge={
  fullScreen(on){ try{ if(window.android&&window.android.setFullScreen) window.android.setFullScreen(!!on); }catch(e){} },
  exit(){ bridge.fullScreen(false);
    try{ if(window.android&&window.android.exitGame){ window.android.exitGame(); return; } }catch(e){}
    showToast('Exit'); }
};
bridge.fullScreen(true);
const store={
  get(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } },
  set(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }
};
let toastTimer=null;
function showToast(txt){
  const t=document.getElementById('toast');
  t.textContent=txt; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),1400);
}
if(location.search.includes('reset')){
  try{ localStorage.removeItem('tm_level'); localStorage.removeItem('tm_tut'); }catch(e){}
  history.replaceState(null,'',location.pathname);
}

/* ================= 音效 ================= */
let AC=null, MASTER=null;
function tone(f,dur,opt={}){ try{
  const {type='sine',vol=0.22,at=0.008,slide=null,delay=0}=opt;
  AC=AC||new (window.AudioContext||window.webkitAudioContext)();
  if(!MASTER){ const c=AC.createDynamicsCompressor(); c.threshold.value=-18; c.ratio.value=6; c.connect(AC.destination);
    MASTER=AC.createGain(); MASTER.gain.value=1.7; MASTER.connect(c); }
  if(AC.state==='suspended') AC.resume();
  const t0=AC.currentTime+delay;
  const o=AC.createOscillator(), g=AC.createGain();
  o.type=type; o.frequency.setValueAtTime(f,t0);
  if(slide) o.frequency.exponentialRampToValueAtTime(slide,t0+dur);
  g.gain.setValueAtTime(0,t0); g.gain.linearRampToValueAtTime(vol,t0+at);
  g.gain.exponentialRampToValueAtTime(0.001,t0+dur);
  o.connect(g); g.connect(MASTER); o.start(t0); o.stop(t0+dur+0.03);
}catch(e){} }
const SC=[523.25,659.25,783.99,1046.5,1318.5];
const sndPick=()=>tone(440,0.08,{type:'triangle',vol:0.35,slide:700});
const sndMatch=()=>{ [0,2,4].forEach((s,i)=>tone(SC[s],0.2,{type:'triangle',vol:0.38,delay:i*0.06})); };
const sndErr=()=>{ tone(170,0.1,{type:'triangle',vol:0.25}); };
const sndWin=()=>{ [0,1,2,3,4].forEach(i=>{ tone(SC[i],0.26,{type:'triangle',vol:0.35,delay:i*0.1}); tone(SC[i]*2,0.16,{vol:0.1,delay:i*0.1}); }); tone(2093,0.5,{vol:0.13,delay:0.55}); };
const sndLose=()=>{ tone(330,0.35,{type:'triangle',vol:0.28}); tone(247,0.5,{type:'triangle',vol:0.24,delay:0.22}); };
const vib=p=>{ try{ navigator.vibrate&&navigator.vibrate(p); }catch(e){} };

/* ================= 关卡生成 =================
   半步网格: x∈0..GX, y∈0..GY(步长=tile/2), z层0..3
   同层不重叠(半步距离≥2); 跨层矩形相交即遮挡  */
const EMO=['🧶','🧸','🎀','🍎','🥕','⚽','🎲','🚗','🦴','🌸','🐟','🧀','⭐','🍩'];
const GX=8, GY=9;                       // 半步网格范围
let level=1, tiles=[], bar=[], playing=true;
const BAR_CAP=7;
const fieldEl=document.getElementById('field');

function levelCfg(L){
  const kinds=Math.min(4+~~((L-1)/2), 12);      // 种类: 4起步, 每2关+1, 封顶12
  const sets =1+(L>3?1:0)+(L>8?1:0);            // 每种几组三连: 1→2→3
  const layers=Math.min(2+~~((L-1)/3), 4);      // 堆叠层数: 2→4
  return {kinds, sets, layers};
}
function genLevel(L){
  const {kinds,sets,layers}=levelCfg(L);
  const pool=[];
  for(let k=0;k<kinds;k++) for(let t=0;t<sets*3;t++) pool.push(k);
  pool.sort(()=>Math.random()-.5);
  // 对称塔式模板: 全步格(5列x6行), 层间错半步; 每层按"中心扩散序"取位保持对称
  const shapes={
    diamond(cx,cy,r){ const o=[]; for(let x=0;x<=8;x+=2)for(let y=0;y<=9;y+=2){ if(Math.abs(x-cx)/2+Math.abs(y-cy)/2<=r) o.push([x,y]); } return o; },
    ring(cx,cy,r){ const o=[]; for(let x=0;x<=8;x+=2)for(let y=0;y<=9;y+=2){ const d=Math.max(Math.abs(x-cx)/2,Math.abs(y-cy)/2); if(d<=r&&d>=Math.max(r-1,0)) o.push([x,y]); } return o; },
    cross(cx,cy,r){ const o=[]; for(let x=0;x<=8;x+=2)for(let y=0;y<=9;y+=2){ if((Math.abs(x-cx)/2<=r&&Math.abs(y-cy)/2<=1)||(Math.abs(y-cy)/2<=r&&Math.abs(x-cx)/2<=1)) o.push([x,y]); } return o; }
  };
  const tpl=[shapes.diamond,shapes.ring,shapes.cross][(L-1)%3];
  const placed=[];
  const byCenter=(a,b)=>(Math.abs(a[0]-4)+Math.abs(a[1]-4))-(Math.abs(b[0]-4)+Math.abs(b[1]-4));
  let li=0, remaining=pool.slice();
  for(let z=0;z<layers && remaining.length;z++){
    const off=z%2;                                  // 层间错半步
    const spots=tpl(4,4,3.5-z*0.6).map(([x,y])=>[Math.min(x+off,8),Math.min(y+off,9)])
      .filter(([x,y])=>!placed.some(p=>p.z===z&&Math.abs(p.x-x)<2&&Math.abs(p.y-y)<2))
      .sort(byCenter);
    const take=Math.min(spots.length, Math.ceil(remaining.length/(layers-z)));
    for(let i=0;i<take && remaining.length;i++){
      placed.push({kind:remaining.pop(), x:spots[i][0], y:spots[i][1], z});
    }
  }
  // 兜底: 没放完的塞任意空位
  for(const kind of remaining){
    outer: for(let z=0;z<layers;z++) for(let x=0;x<=8;x++) for(let y=0;y<=9;y++){
      if(!placed.some(p=>p.z===z&&Math.abs(p.x-x)<2&&Math.abs(p.y-y)<2)){ placed.push({kind,x,y,z}); break outer; }
    }
  }
  return placed;
}
function tileSizePx(){ return fieldEl.clientWidth/( (GX+2)/2 ); }   // 场宽 = (GX+2)个半步
function tilePos(t){
  const s=tileSizePx();
  return { x: t.x*s/2 + s*0.06 + t.z*2, y: t.y*s/2 + s*0.06 - t.z*3, s: s*0.88 };
}
function isBlocked(t){
  return tiles.some(o=>!o.dead && !o.inbar && o.z>t.z &&
    Math.abs(o.x-t.x)<2 && Math.abs(o.y-t.y)<2);
}

/* ================= 渲染与交互 ================= */
function newLevel(){
  tiles.forEach(t=>t.el&&t.el.remove()); bar=[]; playing=true;
  document.getElementById('level').textContent='LEVEL '+level;
  document.getElementById('over').classList.remove('show');
  document.getElementById('barwrap').classList.remove('warn');
  const placed=genLevel(level);
  tiles=placed.map(p=>({...p, dead:false, inbar:false, el:null}));
  const s=tileSizePx();
  for(const t of tiles){
    const el=document.createElement('div'); el.className='tile';
    const pos=tilePos(t);
    el.style.cssText=`left:${pos.x}px;top:${pos.y}px;width:${pos.s}px;height:${pos.s}px;font-size:${pos.s*0.62}px;z-index:${t.z+1}`;
    el.textContent=EMO[t.kind];
    el.addEventListener('click',()=>pickTile(t));
    fieldEl.appendChild(el); t.el=el;
  }
  refreshBlocked();
}
function refreshBlocked(){
  for(const t of tiles){
    if(t.dead||t.inbar) continue;
    t.el.classList.toggle('blocked', isBlocked(t));
  }
}
function barSlotRect(i){
  const slots=document.querySelectorAll('.slot');
  const r=slots[i].getBoundingClientRect(), g=document.getElementById('game').getBoundingClientRect();
  const f=fieldEl.getBoundingClientRect();
  return { x:r.left-f.left+2, y:r.top-f.top+2, s:r.width-4 };
}
function layoutBar(){
  bar.forEach((t,i)=>{
    const p=barSlotRect(i);
    t.el.style.left=p.x+'px'; t.el.style.top=p.y+'px';
    t.el.style.width=p.s+'px'; t.el.style.height=p.s+'px';
    t.el.style.fontSize=(p.s*0.62)+'px';
    t.el.style.zIndex=40;
  });
  document.getElementById('barwrap').classList.toggle('warn', bar.length>=BAR_CAP-1);
}
function pickTile(t){
  if(!playing || t.dead || t.inbar || isBlocked(t)){
    if(playing && !t.dead && !t.inbar){ t.el.classList.add('shake'); sndErr(); setTimeout(()=>t.el.classList.remove('shake'),320); }
    return;
  }
  if(bar.length>=BAR_CAP) return;
  t.inbar=true; sndPick(); vib(8);
  // 插到同款相邻位置
  let insertAt=bar.length;
  for(let i=bar.length-1;i>=0;i--) if(bar[i].kind===t.kind){ insertAt=i+1; break; }
  bar.splice(insertAt,0,t);
  t.el.classList.add('inbar');
  layoutBar(); refreshBlocked();
  if(tutorialActive) setTimeout(positionTutorial,60);
  // 三连检测(动画后消除)
  const same=bar.filter(x=>x.kind===t.kind);
  if(same.length>=3){
    playing='anim';
    setTimeout(()=>{
      same.slice(0,3).forEach(x=>{ x.el.classList.add('popout'); });
      sndMatch(); vib([25,35,25]);
      setTimeout(()=>{
        same.slice(0,3).forEach(x=>{ x.dead=true; x.el.remove(); bar.splice(bar.indexOf(x),1); });
        layoutBar(); playing=true;
        if(tutorialActive) endTutorial(true);
        checkEnd();
      },320);
    },300);
  } else {
    checkEnd();
  }
}
function checkEnd(){
  if(playing!==true) return;
  const left=tiles.filter(t=>!t.dead);
  if(left.length===0){ win(); return; }
  if(bar.length>=BAR_CAP){ lose(); return; }
}
function win(){
  playing=false; sndWin(); vib([50,60,50,60,80]);
  document.getElementById('overIcon').textContent='🎉';
  document.getElementById('overTitle').textContent=`Level ${level} complete!`;
  document.getElementById('overSub').textContent='Perfect!';
  document.getElementById('nextBtn').textContent='Next Level';
  level++; store.set('tm_level',level);
  setTimeout(()=>document.getElementById('over').classList.add('show'),600);
}
function lose(){
  playing=false; sndLose(); vib(90);
  document.getElementById('overIcon').textContent='😵';
  document.getElementById('overTitle').textContent='Rack is full!';
  document.getElementById('overSub').textContent='Try again, you got this!';
  document.getElementById('nextBtn').textContent='Try Again';
  setTimeout(()=>document.getElementById('over').classList.add('show'),700);
}
document.getElementById('nextBtn').addEventListener('click',()=>newLevel());
document.getElementById('restart').addEventListener('click',e=>{ e.stopPropagation(); bridge.exit(); });
window.addEventListener('resize',()=>{ // 重排场上与栏内位置
  for(const t of tiles){ if(t.dead||t.inbar) continue;
    const pos=tilePos(t);
    t.el.style.left=pos.x+'px'; t.el.style.top=pos.y+'px';
    t.el.style.width=pos.s+'px'; t.el.style.height=pos.s+'px'; t.el.style.fontSize=(pos.s*0.62)+'px';
  }
  layoutBar();
});

/* ===== 新手引导: 手指指向同款可点tile, 首次三连消除毕业 ===== */
let tutorialActive=false;
function tutTargetTile(){
  // 优先: 栏中已有款的可点同款; 否则场上可点数最多的款
  const clickable=tiles.filter(t=>!t.dead&&!t.inbar&&!isBlocked(t));
  if(!clickable.length) return null;
  for(const b of bar){ const t=clickable.find(x=>x.kind===b.kind); if(t) return t; }
  const cnt={}; clickable.forEach(t=>cnt[t.kind]=(cnt[t.kind]||0)+1);
  const best=+Object.entries(cnt).sort((a,b)=>b[1]-a[1])[0][0];
  return clickable.find(t=>t.kind===best);
}
function positionTutorial(){
  if(!tutorialActive) return;
  const t=tutTargetTile(); if(!t) return;
  const g=document.getElementById('game').getBoundingClientRect();
  const r=t.el.getBoundingClientRect();
  const f=document.getElementById('tutFinger');
  f.style.left=(r.left+r.width/2-g.left-13)+'px';
  f.style.top=(r.top+r.height/2-g.top-4)+'px';
}
let tutTimer=null;
function tutLoop(){
  clearInterval(tutTimer);
  tutTimer=setInterval(()=>{ if(tutorialActive) positionTutorial(); else clearInterval(tutTimer); },600);
}
function setupTutorial(){
  if(store.get('tm_tut')) return;
  tutorialActive=true;
  document.getElementById('tut').classList.add('show');
  positionTutorial(); tutLoop();
}
function endTutorial(grad){
  document.getElementById('tut').classList.remove('show');
  if(grad){ tutorialActive=false; store.set('tm_tut','1'); }
}

level=(+store.get('tm_level'))||1;
newLevel();
setupTutorial();
</script>
</body>
</html>
