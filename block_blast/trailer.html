<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Block Blast — 15s Trailer</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; user-select:none; }
  html,body { height:100%; overflow:hidden; background:#0d1230; }
  body { display:flex; align-items:center; justify-content:center; font-family:-apple-system,"PingFang SC",Arial,sans-serif; }

  /* ===== 舞台: 竖屏手机画幅 390x844, 自适应缩放 ===== */
  #viewport { position:relative; }
  #stage { width:390px; height:844px; position:relative; overflow:hidden; border-radius:18px;
    background: radial-gradient(130% 90% at 50% 0%, #56649f 0%, #4a5aa8 48%, #3e4c90 100%);
    box-shadow:0 20px 60px rgba(0,0,0,.6); transform-origin:center; }
  /* 运镜层: 所有场景都挂在 cam 上, 推拉摇移都作用于它 */
  #cam { position:absolute; inset:0; transform-origin:50% 45%; }

  .scene { position:absolute; inset:0; opacity:0; pointer-events:none; }
  .scene.on { opacity:1; }

  /* ===== 运镜关键帧 ===== */
  .pushSlow  { animation:pushSlow 3s ease-out forwards; }
  @keyframes pushSlow  { from{transform:scale(1);} to{transform:scale(1.16) translateY(-12px);} }
  .pushTense { animation:pushTense 3.1s ease-in forwards; }
  @keyframes pushTense { from{transform:scale(1);} to{transform:scale(1.24) translateY(-6px);} }
  .zoomPunch { animation:zoomPunch .5s cubic-bezier(.2,1.6,.4,1) forwards; }
  @keyframes zoomPunch { 0%{transform:scale(1.24);} 40%{transform:scale(1.02);} 100%{transform:scale(1.06);} }
  .shake { animation:shake .38s linear; }
  @keyframes shake { 0%,100%{transform:translate(0,0);} 15%{transform:translate(-7px,4px);} 30%{transform:translate(6px,-5px);} 45%{transform:translate(-5px,-3px);} 60%{transform:translate(4px,4px);} 80%{transform:translate(-2px,2px);} }
  .whip { animation:whip .34s ease-out; }
  @keyframes whip { 0%{transform:translateX(46px); filter:blur(6px);} 100%{transform:translateX(0); filter:blur(0);} }
  .dollyOut { animation:dollyOut 1.8s ease-out forwards; }
  @keyframes dollyOut { from{transform:scale(1.18);} to{transform:scale(1);} }

  /* ===== 宝石块 ===== */
  .gb { position:absolute; border-radius:3px; }
  .cellbg { position:absolute; border-radius:3px; background:#1d2a5e; box-shadow:inset 0 1px 3px rgba(0,0,0,.4); }
  .boardframe { position:absolute; background:#151f4d; border-radius:12px; box-shadow:0 6px 18px rgba(0,0,0,.45), inset 0 0 0 3px #0f1738; }
  .boardframe.danger { animation:dangerPulse .8s ease-in-out infinite alternate; }
  @keyframes dangerPulse { from{box-shadow:0 6px 18px rgba(0,0,0,.45), inset 0 0 0 3px #0f1738;} to{box-shadow:0 0 30px rgba(230,70,55,.8), inset 0 0 0 3px #b03a30;} }

  .gb.pop { animation:pop .5s ease var(--d,0ms) forwards; }
  @keyframes pop { 0%{opacity:1; transform:scale(1); filter:brightness(2.2);} 100%{opacity:0; transform:scale(.15); filter:brightness(2.4);} }
  .gb.pulse { animation:hintPulse .38s ease-in-out infinite alternate; }
  @keyframes hintPulse { from{filter:brightness(1.1);} to{filter:brightness(1.95);} }
  .gb.flyin { animation:flyin .7s cubic-bezier(.2,1.3,.4,1) both; }
  @keyframes flyin { from{opacity:0; transform:translate(var(--fx),var(--fy)) rotate(var(--fr)) scale(.4);} to{opacity:1; transform:translate(0,0) rotate(0) scale(1);} }
  .gb.rain { animation:rain 2.6s linear both; }
  @keyframes rain { from{transform:translateY(-140px) rotate(-8deg); opacity:0;} 12%{opacity:.9;} to{transform:translateY(920px) rotate(14deg); opacity:.9;} }
  .gb.breathe { animation:breathe 1.4s ease-in-out infinite alternate; }
  @keyframes breathe { from{transform:scale(1) rotate(var(--r,0deg));} to{transform:scale(1.12) rotate(var(--r,0deg));} }

  .lineFlash { position:absolute; background:rgba(255,255,255,.9); border-radius:4px; animation:lf .34s ease-out forwards; }
  @keyframes lf { from{opacity:.95;} to{opacity:0;} }

  /* ===== 文字元素 ===== */
  .banner { position:absolute; left:50%; top:36%; transform:translate(-50%,-50%); white-space:nowrap;
    font-size:44px; font-weight:900; letter-spacing:.02em;
    background:linear-gradient(180deg,#fff3a6,#ffd23e 40%,#ff7b1a); -webkit-background-clip:text; background-clip:text; color:transparent;
    filter:drop-shadow(0 0 14px rgba(255,190,60,.75)) drop-shadow(0 3px 3px rgba(0,0,0,.5)); animation:bannerPop 1.05s ease-out forwards; }
  @keyframes bannerPop { 0%{opacity:0; transform:translate(-50%,-50%) scale(.3) rotate(-8deg);} 22%{opacity:1; transform:translate(-50%,-50%) scale(1.3) rotate(3deg);} 40%{transform:translate(-50%,-50%) scale(1);} 78%{opacity:1;} 100%{opacity:0; transform:translate(-50%,-64%) scale(1.04);} }
  .floatScore { position:absolute; font-weight:900; font-size:38px; color:#ffe45c; -webkit-text-stroke:1.5px rgba(120,60,0,.55);
    text-shadow:0 3px 6px rgba(0,0,0,.5); animation:floatUp 1s ease-out forwards; }
  @keyframes floatUp { 0%{opacity:0; transform:translateY(8px) scale(.6);} 18%{opacity:1; transform:scale(1.15);} 100%{opacity:0; transform:translateY(-64px) scale(1);} }

  .bigtitle { position:absolute; left:50%; top:34%; transform:translate(-50%,-50%); text-align:center;
    font-size:58px; font-weight:900; color:#fff; line-height:1.12; letter-spacing:.01em;
    text-shadow:0 5px 0 rgba(0,0,0,.28), 0 10px 26px rgba(0,0,0,.4); animation:titleIn .8s cubic-bezier(.2,1.5,.4,1) both; }
  @keyframes titleIn { from{opacity:0; transform:translate(-50%,-50%) scale(.25);} to{opacity:1; transform:translate(-50%,-50%) scale(1);} }
  .subtitle { position:absolute; left:50%; top:47%; transform:translateX(-50%); font-size:19px; font-weight:700; color:#cdd6ff; white-space:nowrap;
    text-shadow:0 2px 4px rgba(0,0,0,.4); animation:fadeUp .7s ease .25s both; }
  @keyframes fadeUp { from{opacity:0; transform:translateX(-50%) translateY(14px);} to{opacity:1; transform:translateX(-50%) translateY(0);} }

  .scoreNum { position:absolute; left:50%; top:38%; transform:translate(-50%,-50%);
    font-size:96px; font-weight:900; color:#fff; text-shadow:0 5px 0 rgba(0,0,0,.3), 0 12px 30px rgba(0,0,0,.35); }
  .recordTag { position:absolute; left:50%; top:52%; transform:translateX(-50%); font-size:26px; font-weight:800; color:#f5b93d;
    text-shadow:0 2px 4px rgba(0,0,0,.4); animation:titleIn .6s cubic-bezier(.2,1.6,.4,1) both; }

  .cta { position:absolute; left:50%; top:60%; transform:translateX(-50%); padding:16px 52px; border-radius:16px; white-space:nowrap;
    font-size:24px; font-weight:900; color:#fff; background:linear-gradient(180deg,#ffb340,#ff8c1a);
    box-shadow:0 6px 0 #c96a08, 0 12px 26px rgba(0,0,0,.4); animation:ctaPulse 1.1s ease-in-out infinite; }
  @keyframes ctaPulse { 0%,100%{transform:translateX(-50%) scale(1);} 50%{transform:translateX(-50%) scale(1.07);} }

  /* 粒子特效层(不随运镜) */
  #fx { position:absolute; inset:0; width:100%; height:100%; z-index:30; pointer-events:none; }
  .ring { position:absolute; width:60px; height:60px; margin:-30px 0 0 -30px; border:5px solid #fff; border-radius:50%;
    z-index:29; pointer-events:none; animation:ringX .6s ease-out forwards; }
  @keyframes ringX { from{transform:scale(.2); opacity:1;} to{transform:scale(7); opacity:0;} }

  /* 白帧转场 */
  #whiteout { position:absolute; inset:0; background:#fff; opacity:0; pointer-events:none; }
  #whiteout.hit { animation:whiteHit .5s ease-out forwards; }
  @keyframes whiteHit { 0%{opacity:1;} 100%{opacity:0;} }

  /* 拖拽演示手 */
  .handdot { position:absolute; width:26px; height:26px; border-radius:50%; background:rgba(255,255,255,.85);
    box-shadow:0 0 0 6px rgba(255,255,255,.25), 0 4px 10px rgba(0,0,0,.4); z-index:5; }

  /* 播放按钮遮罩 */
  #playmask { position:absolute; inset:0; z-index:50; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:18px; background:rgba(10,14,36,.78); backdrop-filter:blur(4px); cursor:pointer; }
  #playmask .pbtn { width:92px; height:92px; border-radius:50%; background:linear-gradient(180deg,#ffb340,#ff8c1a);
    display:flex; align-items:center; justify-content:center; box-shadow:0 8px 24px rgba(0,0,0,.5); animation:ctaPulse 1.2s infinite; }
  #playmask .pbtn::after { content:''; border-style:solid; border-width:18px 0 18px 30px; border-color:transparent transparent transparent #fff; margin-left:7px; }
  #playmask .ptxt { color:#fff; font-weight:800; font-size:18px; text-shadow:0 2px 4px rgba(0,0,0,.5); }

  /* 录制导出按钮 */
  #recBtn { position:fixed; right:16px; top:16px; z-index:60; border:none; cursor:pointer;
    padding:10px 18px; border-radius:12px; font-size:15px; font-weight:800; color:#fff;
    background:rgba(220,68,55,.92); box-shadow:0 4px 12px rgba(0,0,0,.4); }
  #recBtn:active { transform:scale(.95); }
  #recBtn.recording { opacity:0; pointer-events:none; }
  body.recording #progress { display:none; }

  /* 进度条 */
  #progress { position:absolute; left:0; bottom:0; height:4px; background:linear-gradient(90deg,#ffd23e,#ff8c1a); width:0%; z-index:40; }
  #progress.run { animation:prog 15s linear forwards; }
  @keyframes prog { from{width:0%;} to{width:100%;} }
</style>
</head>
<body>
<button id="recBtn">⏺ 导出视频</button>
<div id="viewport">
  <div id="stage">
    <div id="cam"></div>
    <canvas id="fx" width="780" height="1688"></canvas>
    <div id="whiteout"></div>
    <div id="progress"></div>
    <div id="playmask"><div class="pbtn"></div><div class="ptxt">Block Blast — 15s Tanıtım</div></div>
  </div>
</div>

<script>
/* ================= 通用视觉工具(与游戏同款) ================= */
const COLORS=['#dc4437','#f0862c','#f5c235','#52b545','#3ab4ec','#9b51d6','#e05aa8'];
const gemCache=new Map();
function gemBg(c){
  let v=gemCache.get(c);
  if(!v){
    const t=`color-mix(in srgb,${c},#fff 45%)`, l=`color-mix(in srgb,${c},#fff 16%)`,
          r=`color-mix(in srgb,${c},#000 20%)`, b=`color-mix(in srgb,${c},#000 40%)`;
    v=`linear-gradient(${c},${c}) center/62% 62% no-repeat, conic-gradient(from -45deg, ${t} 0 90deg, ${r} 90deg 180deg, ${b} 180deg 270deg, ${l} 270deg 360deg)`;
    gemCache.set(c,v);
  }
  return v;
}
const cam=document.getElementById('cam');
function el(cls,style,parent){ const d=document.createElement('div'); d.className=cls; d.style.cssText=style; (parent||cam).appendChild(d); return d; }
function gb(x,y,s,color,parent,extra){ return el('gb'+(extra||''),`left:${x}px;top:${y}px;width:${s}px;height:${s}px;background:${gemBg(color)}`,parent); }

/* ================= 音效(与游戏同款合成器) ================= */
let AC=null, MASTER=null;
function tone(f,dur,opt={}){ try{
  const {type='sine',vol=0.22,at=0.008,slide=null,delay=0}=opt;
  AC=AC||new (window.AudioContext||window.webkitAudioContext)();
  if(!MASTER){ const c=AC.createDynamicsCompressor(); c.threshold.value=-18; c.ratio.value=6; c.connect(AC.destination);
    MASTER=AC.createGain(); MASTER.gain.value=1.6; MASTER.connect(c); }
  if(AC.state==='suspended') AC.resume();
  const t0=AC.currentTime+delay;
  const o=AC.createOscillator(), g=AC.createGain();
  o.type=type; o.frequency.setValueAtTime(f,t0);
  if(slide) o.frequency.exponentialRampToValueAtTime(slide,t0+dur);
  g.gain.setValueAtTime(0,t0); g.gain.linearRampToValueAtTime(vol,t0+at);
  g.gain.exponentialRampToValueAtTime(0.001,t0+dur);
  o.connect(g); g.connect(MASTER); o.start(t0); o.stop(t0+dur+0.03);
}catch(e){} }
const SC=[523.25,659.25,783.99,1046.5,1318.5];
const sndArp=(n,v)=>{ for(let i=0;i<n;i++){ tone(SC[i],0.24,{type:'triangle',vol:v||0.4,delay:i*0.07}); tone(SC[i]*2,0.15,{vol:0.12,delay:i*0.07}); } };
const sndPlace=()=>{ tone(520,0.09,{vol:0.5,slide:170}); tone(180,0.08,{vol:0.3,slide:90}); };
const sndCombo=c=>{ const f=SC[Math.min(c-1,4)]; tone(f*1.5,0.13,{vol:0.28,delay:0.05}); tone(f*2,0.22,{vol:0.22,delay:0.13}); };
const sndTension=()=>{ for(let i=0;i<6;i++) tone(98,0.16,{type:'triangle',vol:0.3,delay:i*0.42}); };  // 低音心跳
const sndWinBig=()=>{ sndArp(5,0.45); tone(2093,0.7,{vol:0.16,delay:0.5}); };

/* ================= 棋盘切片构造器 ================= */
const CELL=34, GAP=3, PAD=8;
function makeBoard(pattern, bx, by){
  // pattern: 8字符x8行, '.'=空, 数字=COLORS索引
  const size=8*CELL+7*GAP+PAD*2;
  const frame=el('boardframe',`left:${bx}px;top:${by}px;width:${size}px;height:${size}px`);
  const blocks={};
  for(let r=0;r<8;r++)for(let c=0;c<8;c++){
    const x=bx+PAD+c*(CELL+GAP), y=by+PAD+r*(CELL+GAP);
    el('cellbg',`left:${x}px;top:${y}px;width:${CELL}px;height:${CELL}px`);
    const ch=pattern[r][c];
    if(ch!=='.') blocks[r+','+c]=gb(x,y,CELL,COLORS[+ch]);
  }
  return {frame,blocks,bx,by,size,
    pos(r,c){ return {x:bx+PAD+c*(CELL+GAP), y:by+PAD+r*(CELL+GAP)}; }};
}
function clearRow(board,r){
  const p0=board.pos(r,0), w=8*CELL+7*GAP;
  el('lineFlash',`left:${p0.x}px;top:${p0.y}px;width:${w}px;height:${CELL}px`);
  for(let c=0;c<8;c++){
    const b=board.blocks[r+','+c];
    if(b){ b.style.setProperty('--d',(c*28)+'ms'); b.classList.add('pop'); }
  }
  for(let c=0;c<8;c++) setTimeout(()=>boom(p0.x+c*(CELL+GAP)+CELL/2, p0.y+CELL/2, 14, 11), c*28);  // 逐格起爆
  ring(p0.x+w/2, p0.y+CELL/2);
}
function clearCol(board,c){
  const p0=board.pos(0,c), h=8*CELL+7*GAP;
  el('lineFlash',`left:${p0.x}px;top:${p0.y}px;width:${CELL}px;height:${h}px`);
  for(let r=0;r<8;r++){
    const b=board.blocks[r+','+c];
    if(b){ b.style.setProperty('--d',(r*28)+'ms'); b.classList.add('pop'); }
  }
  for(let r=0;r<8;r++) setTimeout(()=>boom(p0.x+CELL/2, p0.y+r*(CELL+GAP)+CELL/2, 14, 11), r*28);  // 逐格起爆
  ring(p0.x+CELL/2, p0.y+h/2);
}
function banner(txt){ const b=el('banner',''); b.textContent=txt; boom(195,300,60,10); setTimeout(()=>b.remove(),1100); }
function floatScore(txt,x,y){ const f=el('floatScore',`left:${x}px;top:${y}px`); f.textContent=txt; setTimeout(()=>f.remove(),1000); }
function shake(){ cam.classList.remove('shake'); void cam.offsetWidth; cam.classList.add('shake'); }
function whiteHit(){ const w=document.getElementById('whiteout'); w.classList.remove('hit'); void w.offsetWidth; w.classList.add('hit'); }
function camSet(cls){ cam.className=''; if(cls){ void cam.offsetWidth; cam.classList.add(cls); } }
function wipe(){ cam.innerHTML=''; cam.className=''; cam.style.transform=''; }

/* ================= 粒子爆炸引擎 ================= */
const fxc=document.getElementById('fx'), fxg=fxc.getContext('2d');
let parts=[];
function boom(x,y,n,pw,cols){
  cols=cols||COLORS;
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, v=(0.25+Math.pow(Math.random(),0.6)*0.95)*pw;
    parts.push({x:x*2+(Math.random()-0.5)*30, y:y*2+(Math.random()-0.5)*30,
      vx:Math.cos(a)*v, vy:Math.sin(a)*v-pw*0.25,
      rot:Math.random()*6.28, vr:(Math.random()-0.5)*0.4,
      s:(3+Math.random()*12)*2, c:cols[Math.floor(Math.random()*cols.length)],
      life:1, dl:0.016+Math.random()*0.016, star:Math.random()<0.3, g:0.32});
  }
  if(parts.length>1600) parts.splice(0, parts.length-1600);   // 上限防卡
}
function fountain(x,y,n,cols){
  for(let i=0;i<n;i++){
    const a=-Math.PI/2+(Math.random()-0.5)*0.9, v=9+Math.random()*15;
    parts.push({x:x*2,y:y*2,vx:Math.cos(a)*v,vy:Math.sin(a)*v,rot:0,vr:(Math.random()-.5)*.4,
      s:(3+Math.random()*8)*2,c:cols[i%cols.length],life:1,dl:0.008+Math.random()*0.008,star:Math.random()<0.5,g:0.42});
  }
}
function confetti(n){
  for(let i=0;i<n;i++) parts.push({x:Math.random()*780,y:-20,vx:(Math.random()-.5)*3,vy:2+Math.random()*4,
    rot:Math.random()*6.28,vr:(Math.random()-.5)*.3,s:(4+Math.random()*8)*2,c:COLORS[i%7],life:1,dl:0.004,star:false,g:0.05});
}
(function fxLoop(){
  fxg.clearRect(0,0,780,1688);
  parts=parts.filter(pt=>pt.life>0);
  for(const pt of parts){
    pt.x+=pt.vx; pt.y+=pt.vy; pt.vy+=pt.g; pt.vx*=0.97; pt.vy*=0.985; pt.rot+=pt.vr; pt.life-=pt.dl;
    fxg.save(); fxg.globalAlpha=Math.max(pt.life,0); fxg.translate(pt.x,pt.y); fxg.rotate(pt.rot);
    fxg.fillStyle=pt.c;
    if(pt.star){ fxg.beginPath();
      for(let k=0;k<8;k++){ const r=k%2?pt.s*0.28:pt.s*0.75, an=k*Math.PI/4;
        k?fxg.lineTo(Math.cos(an)*r,Math.sin(an)*r):fxg.moveTo(Math.cos(an)*r,Math.sin(an)*r); }
      fxg.closePath(); fxg.fill();
    } else fxg.fillRect(-pt.s/2,-pt.s/2,pt.s,pt.s);
    fxg.restore();
  }
  requestAnimationFrame(fxLoop);
})();
function ring(x,y,color){
  const r=el('ring',`left:${x}px;top:${y}px;border-color:${color||'#fff'}`,document.getElementById('stage'));
  setTimeout(()=>r.remove(),650);
}

/* ================= 迪斯科 BGM(125BPM 四踩) ================= */
function ensureBus(){
  AC=AC||new (window.AudioContext||window.webkitAudioContext)();
  if(!MASTER){ const c=AC.createDynamicsCompressor(); c.threshold.value=-18; c.ratio.value=6; c.connect(AC.destination);
    MASTER=AC.createGain(); MASTER.gain.value=1.6; MASTER.connect(c); }
  if(AC.state==='suspended') AC.resume();
}
let _nb=null;
function noiseBuf(){ if(_nb) return _nb;
  const b=AC.createBuffer(1,AC.sampleRate*0.3,AC.sampleRate), d=b.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1; return _nb=b; }
function kick(t){ const o=AC.createOscillator(),g=AC.createGain();
  o.frequency.setValueAtTime(150,t); o.frequency.exponentialRampToValueAtTime(45,t+0.12);
  g.gain.setValueAtTime(0.5,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.16);
  o.connect(g); g.connect(MASTER); o.start(t); o.stop(t+0.18); }
function hat(t,open){ const src=AC.createBufferSource(); src.buffer=noiseBuf();
  const f=AC.createBiquadFilter(); f.type='highpass'; f.frequency.value=7000;
  const g=AC.createGain(), d=open?0.14:0.045;
  g.gain.setValueAtTime(open?0.16:0.12,t); g.gain.exponentialRampToValueAtTime(0.001,t+d);
  src.connect(f); f.connect(g); g.connect(MASTER); src.start(t); src.stop(t+d+0.02); }
function bassN(t,f,d){ const o=AC.createOscillator(),g=AC.createGain(),lp=AC.createBiquadFilter();
  o.type='sawtooth'; o.frequency.value=f; lp.type='lowpass'; lp.frequency.value=520; lp.Q.value=6;
  g.gain.setValueAtTime(0.0001,t); g.gain.linearRampToValueAtTime(0.26,t+0.012); g.gain.exponentialRampToValueAtTime(0.001,t+d);
  o.connect(lp); lp.connect(g); g.connect(MASTER); o.start(t); o.stop(t+d+0.02); }
function stab(t,fs){ fs.forEach(f=>{ const o=AC.createOscillator(),g=AC.createGain();
  o.type='square'; o.frequency.value=f;
  g.gain.setValueAtTime(0.05,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.14);
  o.connect(g); g.connect(MASTER); o.start(t); o.stop(t+0.16); }); }
function riser(t,d){ const o=AC.createOscillator(),g=AC.createGain();
  o.type='sawtooth'; o.frequency.setValueAtTime(80,t); o.frequency.exponentialRampToValueAtTime(900,t+d);
  g.gain.setValueAtTime(0.0001,t); g.gain.linearRampToValueAtTime(0.15,t+d); g.gain.exponentialRampToValueAtTime(0.001,t+d+0.15);
  o.connect(g); g.connect(MASTER); o.start(t); o.stop(t+d+0.2); }
function crash(t){ const src=AC.createBufferSource(); src.buffer=noiseBuf(); src.loop=true;
  const f=AC.createBiquadFilter(); f.type='highpass'; f.frequency.value=4500;
  const g=AC.createGain(); g.gain.setValueAtTime(0.3,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.9);
  src.connect(f); f.connect(g); g.connect(MASTER); src.start(t); src.stop(t+1); }
function disco(){
  ensureBus();
  const B=60/125, t0=AC.currentTime+0.06;
  const roots =[55,55,43.65,49, 55,55,43.65,49];                       // Am Am F G ×2
  const chords=[[220,261.6,329.6],[220,261.6,329.6],[174.6,220,261.6],[196,246.9,293.7]];
  for(let bar=0;bar<8;bar++){
    const bt=t0+bar*4*B, tense=(bar===4||bar===5);                     // ≈7.7-11.5s 紧张段
    for(let beat=0;beat<4;beat++){
      const t=bt+beat*B;
      kick(t);
      if(!tense){ hat(t+B/2,false); if(beat===3) hat(t+B*0.75,true); }
      const r=roots[bar];
      bassN(t, r*2, B*0.45);
      bassN(t+B/2, tense? r*2 : r*4, B*0.4);                           // 迪斯科八度跳; 紧张段压低
      if(!tense && (beat===1||beat===3)) stab(t, chords[bar%4]);
    }
  }
  riser(t0+8.3, 2.2);            // 憋到爆发
  crash(t0+10.62);               // S4 三行爆消
  crash(t0+13.0);                // S6 收尾进场
}

/* ================= 时间轴引擎 ================= */
let timers=[];
function at(sec,fn){ timers.push(setTimeout(fn,sec*1000)); }
function play(){
  timers.forEach(clearTimeout); timers=[];
  const pr=document.getElementById('progress');
  pr.classList.remove('run'); void pr.offsetWidth; pr.classList.add('run');
  disco();
  at(0.0,s1); at(2.2,s2); at(5.2,s3); at(8.0,s4); at(11.0,s5); at(13.0,s6);
  at(15.0,play);   // 循环
}
document.getElementById('playmask').addEventListener('click',function(){
  this.remove(); play();
});

/* ===== 一键导出: Chrome标签页捕获(含页面音频) → 录15s → 下载webm ===== */
document.getElementById('recBtn').addEventListener('click', async function(){
  try{
    const stage=document.getElementById('stage');
    const disp=await navigator.mediaDevices.getDisplayMedia({
      video:{frameRate:60}, audio:true,
      preferCurrentTab:true, selfBrowserSurface:'include'
    });
    if(!disp.getAudioTracks().length)
      alert('提示: 未勾选「同时分享标签页音频」, 这次导出将无声。');
    const vtrack=disp.getVideoTracks()[0];
    let croppedToStage=false;
    if(window.CropTarget && vtrack.cropTo){
      try{ await vtrack.cropTo(await CropTarget.fromElement(stage)); croppedToStage=true; }catch(e){}
    }
    /* canvas中转: 恒定780x1688分辨率, 每帧主动重绘
       (mp4的H.264编码器不允许中途变分辨率, cropTo会改流尺寸导致静帧bug) */
    const cv=document.createElement('canvas'); cv.width=780; cv.height=1688;
    const cx=cv.getContext('2d');
    const vid=document.createElement('video');
    vid.srcObject=disp; vid.muted=true; vid.playsInline=true;
    await vid.play();
    let drawing=true;
    (function draw(){
      if(!drawing) return;
      if(vid.videoWidth){
        if(croppedToStage){
          cx.drawImage(vid, 0,0,vid.videoWidth,vid.videoHeight, 0,0,780,1688);
        }else{
          const r=stage.getBoundingClientRect(), k=vid.videoWidth/innerWidth;
          cx.drawImage(vid, r.left*k, r.top*k, r.width*k, r.height*k, 0,0,780,1688);
        }
      }
      requestAnimationFrame(draw);
    })();
    const out=cv.captureStream(60);
    disp.getAudioTracks().forEach(t=>out.addTrack(t));
    const forceWebm=location.search.includes('fmt=webm');
    const mimes=forceWebm
      ? ['video/webm;codecs=vp9,opus','video/webm']
      : ['video/mp4;codecs=avc1.640028,mp4a.40.2','video/mp4','video/webm;codecs=vp9,opus','video/webm'];
    const mime=mimes.find(m=>MediaRecorder.isTypeSupported(m))||'video/webm';
    const ext=mime.startsWith('video/mp4')?'mp4':'webm';
    const rec=new MediaRecorder(out,{mimeType:mime, videoBitsPerSecond:10_000_000});
    const chunks=[];
    rec.ondataavailable=e=>{ if(e.data.size) chunks.push(e.data); };
    rec.onstop=()=>{
      drawing=false;
      disp.getTracks().forEach(t=>t.stop());
      document.body.classList.remove('recording');
      this.classList.remove('recording');
      const blob=new Blob(chunks,{type:mime.split(';')[0]});
      const a=document.createElement('a');
      a.href=URL.createObjectURL(blob); a.download='blockblast_trailer.'+ext; a.click();
      if(ext==='webm') alert('浏览器不支持mp4封装, 已导出webm。');
    };
    document.body.classList.add('recording');
    this.classList.add('recording');
    document.getElementById('playmask')?.remove();
    play();
    rec.start();
    setTimeout(()=>rec.stop(), 15600);
  }catch(e){ /* 用户取消共享 */ }
});
