<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="description" content="Block Blast — blok bulmaca oyunu. Sürükle, yerleştir, patlat!">
<meta name="theme-color" content="#4a5aa8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect x="8" y="8" width="84" height="84" rx="14" fill="%233ab4ec"/><rect x="20" y="20" width="60" height="60" rx="6" fill="%2378d0f5"/></svg>'>
<title>Block Blast</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; -webkit-user-select:none; -webkit-touch-callout:none; }
  html,body { height:100%; overflow:hidden; }
  :root { --gw: min(96vw, 58vh); }          /* 游戏区基准宽度, 全局唯一 */
  body {
    background: radial-gradient(130% 90% at 50% 0%, #56649f 0%, #4a5aa8 48%, #3e4c90 100%);
    font-family: -apple-system, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
    display:flex; align-items:center; justify-content:center;
    touch-action:none;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  #game { width:var(--gw); position:relative; }

  /* 顶栏: 左👑最高分 右↻ */
  #topbar { display:flex; align-items:center; justify-content:space-between; padding:2px 4px 0; }
  #bestwrap { display:flex; align-items:center; gap:8px; color:#f5b93d; font-weight:800; font-size:clamp(20px,5.5vw,28px); text-shadow:0 2px 3px rgba(0,0,0,.35); }
  #bestwrap .crown { font-size:1.15em; filter:brightness(.55) sepia(1) hue-rotate(190deg) saturate(3); }
  #restart { border:none; cursor:pointer; width:clamp(36px,9vw,46px); height:clamp(36px,9vw,46px); border-radius:50%;
    background:rgba(255,255,255,.16); color:#fff; font-size:clamp(19px,5vw,25px); font-weight:800; line-height:1;
    box-shadow:inset 0 2px 0 rgba(255,255,255,.18), 0 2px 5px rgba(0,0,0,.28); }
  #restart:active { transform:scale(.92); }
  /* Toast 轻提示 */
  #toast { position:fixed; left:50%; bottom:14%; transform:translateX(-50%) translateY(16px);
    background:rgba(20,26,58,.92); color:#fff; font-weight:700; font-size:clamp(14px,4vw,17px);
    padding:10px 28px; border-radius:22px; opacity:0; pointer-events:none; z-index:100; transition:all .25s ease; }
  #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  .piece.shake { animation:shake .3s ease; }
  .piece.spawn { animation:spawnIn .22s ease; }
  @keyframes spawnIn { from{transform:scale(.3); opacity:0;} to{transform:scale(1); opacity:1;} }
  @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-5px);} 50%{transform:translateX(5px);} 75%{transform:translateX(-3px);} }
  /* 本局分数: 棋盘上方居中大字 */
  #scorebar { text-align:center; padding:2px 0 10px; }
  #score { display:inline-block; font-size:clamp(44px,12vw,68px); font-weight:800; color:#fff; line-height:1.05; text-shadow:0 3px 6px rgba(0,0,0,.35); }
  #score.bump { animation:scoreBump .28s ease; }
  @keyframes scoreBump { 40%{transform:scale(1.16);} 100%{transform:scale(1);} }

  /* 棋盘 */
  #boardwrap { background:#151f4d; border-radius:10px; padding:6px; box-shadow:0 5px 16px rgba(0,0,0,.4), inset 0 0 0 3px #0f1738; }
  #boardwrap.danger { animation:dangerPulse .9s ease-in-out infinite alternate; }
  @keyframes dangerPulse {
    from { box-shadow:0 5px 16px rgba(0,0,0,.4), inset 0 0 0 3px #0f1738; }
    to   { box-shadow:0 0 22px rgba(230,70,55,.65), inset 0 0 0 3px #b03a30; }
  }
  #board { display:grid; grid-template-columns:repeat(8,1fr); grid-template-rows:repeat(8,1fr); gap:2px; aspect-ratio:1; position:relative; }
  .cell { background:#1d2a5e; border-radius:2px; box-shadow:inset 0 1px 3px rgba(0,0,0,.4); position:relative; }
  .cell .fill { position:absolute; inset:0; border-radius:2px; opacity:0; transform:scale(.3); }
  #game.dead .fill, #game.dead .pc { filter:grayscale(1) brightness(.55); transition:filter .55s ease; }
  .cell.filled .fill { opacity:1; transform:scale(1); }
  .cell.pop .fill { animation:pop .26s ease var(--d,0ms) forwards; }
  @keyframes pop { 0%{opacity:1; transform:scale(1); filter:brightness(2.2);} 100%{opacity:0; transform:scale(.15); filter:brightness(2.2);} }
  /* 落点/可消除预览: 独立覆盖层(iOS WebKit拖动中改cell类偶发不重绘; 删节点必然消失) */
  #hintLayer { position:absolute; inset:0; pointer-events:none; z-index:5; }
  .hcell { position:absolute; border-radius:2px; }
  .hcell.hpulse { animation:hintPulse .4s ease-in-out infinite alternate; }
  @keyframes hintPulse { from{filter:brightness(1.15);} to{filter:brightness(1.9);} }

  /* 候选区 */
  #tray { display:flex; justify-content:space-around; align-items:center; margin-top:14px; height:calc(var(--gw) * 0.30); }
  .slot { width:31%; height:100%; display:flex; align-items:center; justify-content:center; }
  .piece { position:relative; transition:transform .15s; }
  .piece.dragging { opacity:0; }
  .piece .pc { position:absolute; border-radius:2px; }

  /* 拖动幽灵 */
  #dragGhost { position:fixed; left:0; top:0; pointer-events:none; z-index:50; display:none; will-change:transform; filter:drop-shadow(0 10px 12px rgba(0,0,0,.45)); }
  #dragGhost .pc { position:absolute; border-radius:2px; }

  /* 消除白光横扫 */
  .lineFlash { position:absolute; z-index:38; pointer-events:none; background:rgba(255,255,255,.85); border-radius:4px;
    animation:lineFlashA .3s ease-out forwards; }
  @keyframes lineFlashA { 0%{opacity:.85;} 100%{opacity:0;} }

  /* 飘字: 消除得分 */
  .float { position:absolute; z-index:40; font-weight:900; pointer-events:none; animation:floatUp 1s ease-out forwards; font-size:clamp(26px,7.5vw,40px);
    color:#ffe45c; -webkit-text-stroke:1.5px rgba(120,60,0,.55); text-shadow:0 3px 5px rgba(0,0,0,.45); }
  @keyframes floatUp { 0%{opacity:0; transform:translateY(8px) scale(.6);} 18%{opacity:1; transform:translateY(0) scale(1.12);} 30%{transform:translateY(-4px) scale(1);} 100%{opacity:0; transform:translateY(-60px) scale(1);} }
  /* 消除横幅: 夸奖+COMBO 合并一行 */
  .combo { position:absolute; z-index:41; left:50%; top:38%; transform:translate(-50%,-50%); white-space:nowrap; max-width:96%;
    font-size:clamp(26px,7.5vw,42px); font-weight:900; pointer-events:none; letter-spacing:.02em;
    background:linear-gradient(180deg,#fff3a6,#ffd23e 40%,#ff7b1a); -webkit-background-clip:text; background-clip:text; color:transparent;
    filter:drop-shadow(0 0 12px rgba(255,190,60,.7)) drop-shadow(0 3px 3px rgba(0,0,0,.5)); animation:comboPop 1.1s ease-out forwards; }
  @keyframes comboPop {
    0%{opacity:0; transform:translate(-50%,-50%) scale(.3) rotate(-8deg);}
    22%{opacity:1; transform:translate(-50%,-50%) scale(1.35) rotate(4deg);}
    38%{transform:translate(-50%,-50%) scale(1) rotate(0deg);}
    75%{opacity:1;}
    100%{opacity:0; transform:translate(-50%,-66%) scale(1.05);}
  }

  /* 新手引导 */
  #tut { position:absolute; inset:0; z-index:45; pointer-events:none; display:none; }
  #tut.show { display:block; }
  #tutFinger { position:absolute; font-size:clamp(34px,9vw,46px); filter:drop-shadow(0 3px 4px rgba(0,0,0,.45));
    animation:tutMove 1.6s ease-in-out infinite; will-change:left,top; }
  @keyframes tutMove {
    0%{ left:var(--fx); top:var(--fy); transform:scale(1); opacity:0; }
    12%{ opacity:1; }
    60%{ left:var(--tx); top:var(--ty); transform:scale(1); }
    72%{ left:var(--tx); top:var(--ty); transform:scale(.82); }
    86%{ left:var(--tx); top:var(--ty); transform:scale(1); opacity:1; }
    100%{ left:var(--tx); top:var(--ty); transform:scale(1); opacity:0; }
  }
  #tutTip { position:absolute; left:50%; transform:translateX(-50%); top:var(--tipy);
    background:rgba(255,255,255,.95); color:#2b3566; font-weight:800; font-size:clamp(14px,4vw,18px);
    padding:8px 18px; border-radius:20px; box-shadow:0 4px 10px rgba(0,0,0,.3); white-space:nowrap; }

  /* 结算 */
  #over { position:absolute; inset:0; z-index:60; display:none; align-items:center; justify-content:center; border-radius:12px; background:rgba(10,14,32,.82); backdrop-filter:blur(3px); }
  #over.show { display:flex; animation:fadeIn .35s ease; }
  #over.show #overCard { animation:cardIn .38s cubic-bezier(.34,1.4,.64,1); }
  @keyframes cardIn { from{transform:scale(.72); opacity:0;} to{transform:scale(1); opacity:1;} }
  @keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
  #overCard { text-align:center; color:#fff; padding:30px 40px; }
  #overCard h2 { font-size:clamp(26px,7vw,36px); margin-bottom:18px; text-shadow:0 3px 0 rgba(0,0,0,.35); }
  #overCard .newbest { color:#f7c948; font-size:clamp(16px,4.5vw,20px); font-weight:700; margin-bottom:8px; min-height:1.4em; }
  #overCard .fin { font-size:clamp(44px,13vw,72px); font-weight:900; margin-bottom:4px; text-shadow:0 4px 0 rgba(0,0,0,.35); }
  #overCard .b { color:#9fb0e8; font-size:clamp(14px,4vw,17px); margin-bottom:8px; }
  #overStats { color:#7f92d6; font-size:clamp(13px,3.6vw,15px); margin-bottom:24px; }
  #overBtns { display:flex; gap:14px; justify-content:center; align-items:stretch; }
  #retry { border:none; cursor:pointer; font-size:clamp(16px,4.6vw,20px); font-weight:800; color:#fff; padding:14px 30px; border-radius:14px;
    background:linear-gradient(180deg,#ffb340,#ff8c1a); box-shadow:0 5px 0 #c96a08, 0 8px 14px rgba(0,0,0,.35); }
  #retry:active { transform:translateY(3px); box-shadow:0 2px 0 #c96a08; }
  #exitBtn { border:2px solid rgba(255,255,255,.45); cursor:pointer; font-size:clamp(16px,4.6vw,20px); font-weight:800; color:#fff; padding:14px 30px; border-radius:14px;
    background:rgba(255,255,255,.08); }
  #exitBtn:active { transform:translateY(2px); }
  /* 横屏矮屏: 竖版游戏, 提示旋转 */
  #rotate { display:none; position:fixed; inset:0; z-index:99; background:#4a5aa8;
    color:#fff; font-size:clamp(16px,3vh,22px); font-weight:800; text-align:center;
    align-items:center; justify-content:center; flex-direction:column; gap:14px; }
  #rotate .ph { font-size:44px; animation:rot 1.6s ease-in-out infinite; }
  @keyframes rot { 0%,20%{transform:rotate(0);} 60%,100%{transform:rotate(90deg);} }
  @media (orientation:landscape) and (max-height:520px) { #rotate { display:flex; } }
</style>
</head>
<body>
<div id="game">
  <div id="topbar">
    <div id="bestwrap"><span class="crown">👑</span><span id="best">0</span></div>
    <button id="restart" title="Çıkış">✕</button>
  </div>
  <div id="scorebar"><span id="score">0</span></div>
  <div id="boardwrap"><div id="board"></div></div>
  <div id="tray"><div class="slot" data-i="0"></div><div class="slot" data-i="1"></div><div class="slot" data-i="2"></div></div>
  <div id="tut"><div id="tutTip">Buraya sürükle!</div><div id="tutFinger">👆</div></div>
  <div id="over"><div id="overCard">
    <h2 id="overTitle">Oyun Bitti</h2>
    <div class="newbest" id="nb"></div>
    <div class="fin" id="finScore">0</div>
    <div class="b">En İyi Skor <span id="overBest">0</span></div>
    <div id="overStats"></div>
    <div id="overBtns"><button id="retry">Tekrar Oyna</button><button id="exitBtn">Çıkış</button></div>
  </div></div>
</div>
<div id="dragGhost"></div>
<div id="rotate"><div class="ph">📱</div><div>Dikey moda çevirin</div></div>
<div id="toast"></div>

<script>
/* ================= 数值配置(全部旋钮) ================= */
const CFG = {
  stages: [30, 110],                      // 阶段切换点(累计放置块数): 暖场/心流/收官 — 标定:中位死亡117块≈10分钟
  rescueThresh: [0.40, 0.60, null],       // 各阶段救场拥挤阈值(null=关闭)
  redraw: [10, 5, 0],                     // 各阶段发牌重抽预算(抽到可放为止, 用完则随机)
  clearBase: 10,                          // 消除基础分
  comboCap: 5,                            // 连消倍率上限
  clearAnimMs: 380,                       // 消除动画总窗口(含波浪扩散延迟)
  overDelayMs: 1000,                      // 死局到弹窗的间隔(棋盘先灰化0.55s)
  dangerOcc: 0.72,                        // 危险红光的拥挤度阈值
  // 发牌权重 [暖场, 心流, 收官] — 模拟器1000局标定: 平均77块/局≈13-15分钟
  weights: {
    B1:[15,10,4], B2:[18,14,6], B3:[15,15,8], B4:[8,9,10], B5:[4,5,9],
    B6:[15,15,10], B7:[2,4,14], B8:[5,6,12], B9:[10,8,6], B10:[3,7,10], B11:[5,7,6]
  }
};

/* ============ 形状库: 每类含朝向变体(格子[r,c]) ============ */
function line(n,horiz){ const a=[]; for(let i=0;i<n;i++) a.push(horiz?[0,i]:[i,0]); return a; }
function rect(h,w){ const a=[]; for(let r=0;r<h;r++)for(let c=0;c<w;c++)a.push([r,c]); return a; }
function rot(cells){ const mr=Math.max(...cells.map(c=>c[0])); return cells.map(([r,c])=>[c, mr-r]); }
function rots4(base){ const out=[base]; let cur=base; for(let i=0;i<3;i++){ cur=rot(cur); out.push(cur);} return out; }
const SHAPES = {
  B1:{color:'#ffca2b', v:[[[0,0]]]},                          // 亮黄
  B2:{color:'#ff9327', v:[line(2,true), line(2,false)]},      // 亮橙
  B3:{color:'#22c7f2', v:[line(3,true), line(3,false)]},      // 天青
  B4:{color:'#4a7bff', v:[line(4,true), line(4,false)]},      // 亮蓝
  B5:{color:'#ff4d54', v:[line(5,true), line(5,false)]},      // 亮红
  B6:{color:'#3fd35d', v:[rect(2,2)]},                        // 亮绿
  B7:{color:'#ff5b8f', v:[rect(3,3)]},                        // 玫红(与B5红区分)
  B8:{color:'#b45cf0', v:[rect(2,3), rect(3,2)]},             // 亮紫
  B9:{color:'#ff7e2e', v:rots4([[0,0],[1,0],[1,1]])},         // 橙红
  B10:{color:'#7d6bff', v:rots4([[0,0],[1,0],[2,0],[2,1],[2,2]])}, // 靛蓝
  B11:{color:'#ff5fae', v:rots4([[0,0],[0,1],[0,2],[1,1]])}   // 亮粉
};
/* 宝石切面: 上亮/左次亮/右暗/下最暗 + 中心平台(按颜色缓存, 避免每帧拼串) */
const gemCache=new Map();
function gemBg(c){
  let v=gemCache.get(c);
  if(!v){
    const t=`color-mix(in srgb,${c},#fff 45%)`, l=`color-mix(in srgb,${c},#fff 16%)`,
          r=`color-mix(in srgb,${c},#000 20%)`, b=`color-mix(in srgb,${c},#000 40%)`;
    v=`linear-gradient(${c},${c}) center/62% 62% no-repeat, conic-gradient(from -45deg, ${t} 0 90deg, ${r} 90deg 180deg, ${b} 180deg 270deg, ${l} 270deg 360deg)`;
    gemCache.set(c,v);
  }
  return v;
}

/* ================= 状态 ================= */
const N=8;
let grid, tray, placed, score, best, combo, playing;
let stats={lines:0,maxCombo:0};              // 本局战绩
const boardEl=document.getElementById('board'), trayEl=document.getElementById('tray');
const scoreEl=document.getElementById('score'), bestEl=document.getElementById('best');
const ghost=document.getElementById('dragGhost');
const cells=[];

/* 本地存储安全封装(隐私模式下 localStorage 会抛异常) */
const store={
  get(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } },
  set(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }
};

/* ================= 音效(WebAudio 合成, 带包络防爆音) ================= */
let AC=null;
function tone(f,dur,opt={}){ try{
  const {type='sine',vol=0.2,at=0.008,slide=null,delay=0}=opt;
  AC=AC||new (window.AudioContext||window.webkitAudioContext)();
  if(AC.state==='suspended') AC.resume();          // iOS: 必须在用户手势里激活
  const t0=AC.currentTime+delay;
  const o=AC.createOscillator(), g=AC.createGain();
  o.type=type; o.frequency.setValueAtTime(f,t0);
  if(slide) o.frequency.exponentialRampToValueAtTime(slide,t0+dur);
  g.gain.setValueAtTime(0,t0);
  g.gain.linearRampToValueAtTime(vol,t0+at);          // 软起音
  g.gain.exponentialRampToValueAtTime(0.001,t0+dur);  // 自然衰减
  o.connect(g); g.connect(AC.destination);
  o.start(t0); o.stop(t0+dur+0.03);
}catch(e){} }
const SCALE=[523.25,659.25,783.99,1046.5,1318.5];      // C5 E5 G5 C6 E6 五声音阶
const vib=p=>{ try{ navigator.vibrate&&navigator.vibrate(p); }catch(e){} };  // 安卓触觉反馈
// 全套音效走"明亮上扬 + 高频铃声"(sine/triangle), 无低频砰/sawtooth → 轻快愉悦不沉闷
const sndPlace=()=>{ tone(659,0.07,{type:'sine',vol:0.15,slide:988}); };   // 明快上扬"叮"
// 消除: 高八度 sine 亮铃琶音(与连消 sndCombo 同族清亮音色)
const sndClear=n=>{ const k=Math.min(Math.max(n,2),4);   // 1行也用2行的声音
  for(let i=0;i<k;i++){
    tone(SCALE[i]*2,0.18,{type:'sine',vol:0.17,delay:i*0.06});   // 高八度亮铃(主)
    tone(SCALE[i]*3,0.13,{type:'sine',vol:0.07,delay:i*0.06});   // 更高泛音, 闪亮
  } };
const sndCombo=c=>{ const f=SCALE[Math.min(c-1,4)];
  tone(f*2,0.14,{type:'sine',vol:0.14,delay:0.05}); tone(f*3,0.16,{type:'sine',vol:0.08,delay:0.12}); }; // 越连越高越亮
const sndDead=()=>{ // 柔和下行三音(温和收尾, 不低沉)
  tone(784,0.16,{type:'sine',vol:0.14}); tone(659,0.18,{type:'sine',vol:0.13,delay:0.13}); tone(523,0.3,{type:'sine',vol:0.12,delay:0.3}); };
// 大消除闪亮爆发: 明亮上扫 + 铃铛叮当(全高频, 无低频)
const sndBurst=()=>{
  tone(784,0.16,{type:'sine',vol:0.14,slide:1568});      // 明亮上扫
  tone(1046.5,0.14,{type:'sine',vol:0.12,delay:0.04});   // 铃铛
  tone(1568,0.14,{type:'triangle',vol:0.09,delay:0.1});  // 闪亮尾音
};

/* ================= 初始化棋盘 DOM ================= */
for(let i=0;i<N*N;i++){
  const d=document.createElement('div'); d.className='cell';
  const f=document.createElement('div'); f.className='fill'; d.appendChild(f);
  boardEl.appendChild(d); cells.push(d);
}
const hintLayer=document.createElement('div'); hintLayer.id='hintLayer'; boardEl.appendChild(hintLayer);

/* ================= 发牌 ================= */
function stage(){ return placed<=CFG.stages[0]?0 : placed<=CFG.stages[1]?1 : 2; }
function occupancy(){ let n=0; for(const r of grid) for(const v of r) if(v) n++; return n/(N*N); }
function pickType(st){
  const keys=Object.keys(CFG.weights);
  let tot=0; for(const k of keys) tot+=CFG.weights[k][st];
  let x=Math.random()*tot;
  for(const k of keys){ x-=CFG.weights[k][st]; if(x<0) return k; }
  return keys[0];
}
function canPlaceAt(v,r,c){ for(const [dr,dc] of v){ const rr=r+dr,cc=c+dc; if(rr<0||cc<0||rr>=N||cc>=N||grid[rr][cc]) return false; } return true; }
function anyPlacement(v){ for(let r=0;r<N;r++)for(let c=0;c<N;c++) if(canPlaceAt(v,r,c)) return true; return false; }
function makePiece(type){ const s=SHAPES[type]; return {type, color:s.color, v:s.v[Math.floor(Math.random()*s.v.length)]}; }
function dealPiece(st){
  const n=CFG.redraw[st];
  for(let t=0;t<n;t++){
    const p=makePiece(pickType(st));
    if(anyPlacement(p.v)) return p;           // 重抽预算内找可放的
  }
  return makePiece(pickType(st));             // 预算耗尽: 随机发, 可能放不下
}
function refillTray(){
  const st=stage();
  tray=[dealPiece(st),dealPiece(st),dealPiece(st)];
  const th=CFG.rescueThresh[st];
  if(th!==null && occupancy()>=th){           // 救场: 强制含1个可放小块
    const smalls=['B1','B2','B3'];
    const ok=tray.some(p=>smalls.includes(p.type)&&anyPlacement(p.v));
    if(!ok){
      for(const sm of smalls){
        const p=makePiece(sm);
        if(anyPlacement(p.v)){ tray[Math.floor(Math.random()*3)]=p; break; }
      }
    }
  }
  renderTray();
}

/* ================= 渲染 ================= */
function cellPx(){ return cells[0].getBoundingClientRect().width; }
function renderBoard(){
  for(let r=0;r<N;r++)for(let c=0;c<N;c++){
    const el=cells[r*N+c], v=grid[r][c];
    el.classList.toggle('filled', !!v);
    el.querySelector('.fill').style.background = v?gemBg(v):'';
  }
  // 拥挤度>72%: 棋盘红光脉冲警告
  document.getElementById('boardwrap').classList.toggle('danger', playing!==false && occupancy()>CFG.dangerOcc);
}
function drawPieceInto(el,p,unit){
  el.innerHTML='';
  const rs=p.v.map(x=>x[0]), cs=p.v.map(x=>x[1]);
  const h=(Math.max(...rs)+1), w=(Math.max(...cs)+1);
  el.style.width=w*unit+'px'; el.style.height=h*unit+'px';
  for(const [r,c] of p.v){
    const d=document.createElement('div'); d.className='pc';
    d.style.cssText+=`left:${c*unit}px;top:${r*unit}px;width:${unit-2}px;height:${unit-2}px;background:${gemBg(p.color)}`;
    el.appendChild(d);
  }
}
function renderTray(){
  const unit=Math.max(cellPx()*0.62, 16);
  document.querySelectorAll('.slot').forEach((s,i)=>{
    s.innerHTML='';
    const p=tray[i]; if(!p) return;
    const el=document.createElement('div'); el.className='piece'; el.dataset.i=i;
    drawPieceInto(el,p,unit);
    if(!anyPlacement(p.v)) el.style.opacity=.35;
    s.appendChild(el);
  });
}

/* ================= 拖放 ================= */
let drag=null, busy=false, hintRaf=null;
// 由指针坐标算幽灵位置并定位(纯 GPU transform, 零 reflow)
function computeAndApply(){
  if(!drag) return;
  drag.gx=drag.cx-drag.gw/2;
  drag.gy=drag.cy-drag.gh/2-drag.offY;
  ghost.style.transform=`translate(${drag.gx}px,${drag.gy}px)`;
}
// 每帧统一消费指针坐标: 合并 pointermove/touchmove 高频事件, 坐标未变则整帧跳过 → 低端机不卡
function dragFrame(){
  if(!drag){ hintRaf=null; return; }
  if(drag.cx!==drag._lx || drag.cy!==drag._ly){
    drag._lx=drag.cx; drag._ly=drag.cy;
    computeAndApply();
    updateHints();
  }
  hintRaf=requestAnimationFrame(dragFrame);
}
function resetDrag(){
  drag=null; cancelAnimationFrame(hintRaf); hintRaf=null;
  ghost.style.display='none'; lastHintKey=''; clearHints();
  document.querySelectorAll('.piece.dragging').forEach(x=>x.classList.remove('dragging'));
}
document.addEventListener('pointercancel',()=>{ if(drag){ resetDrag(); renderTray(); } });
document.addEventListener('lostpointercapture',()=>{ setTimeout(()=>{ if(drag){ resetDrag(); renderTray(); } },60); });
// iOS兜底: pointer事件丢失时touch事件仍可靠; 所有手指离屏但drag还在 → 重置
document.addEventListener('touchend',e=>{ if(drag && e.touches.length===0) setTimeout(()=>{ if(drag){ resetDrag(); renderTray(); } },80); },{passive:true});
document.addEventListener('touchcancel',()=>{ if(drag){ resetDrag(); renderTray(); } },{passive:true});
window.addEventListener('blur',()=>{ if(drag){ resetDrag(); renderTray(); } });
document.addEventListener('visibilitychange',()=>{ if(document.hidden && drag){ resetDrag(); renderTray(); } });
document.addEventListener('pointerdown',e=>{
  if(!playing || busy) return;
  if(drag){
    // 卡死自愈: 600ms无活动视为幽灵拖拽(iOS丢pointerup), 重置后继续本次操作
    if(Date.now()-(drag.lastAct||0)>600){ resetDrag(); renderTray(); }
    else return;                                   // 活跃拖拽中: 忽略其它手指
  }
  const pieceEl=e.target.closest('.piece'); if(!pieceEl) return;
  const i=+pieceEl.dataset.i, p=tray[i]; if(!p) return;
  if(!anyPlacement(p.v)){                        // 放不下: 抖动提示
    pieceEl.classList.add('shake');
    tone(330,0.08,{type:'sine',vol:0.1}); tone(262,0.12,{type:'sine',vol:0.09,delay:0.08});   // 温和"不行"提示(不沉闷)
    setTimeout(()=>pieceEl.classList.remove('shake'),320);
    return;
  }
  const unit=cellPx()+3;
  drawPieceInto(ghost,p,unit);
  ghost.style.display='block';
  const gw=parseFloat(ghost.style.width)||0, gh=parseFloat(ghost.style.height)||0;
  // offY: 触摸时色块中心抬到手指上方 1.3 格(更跟手, 又不被手指完全挡住)
  drag={i,p,unit,offY:cellPx()*(e.pointerType==='touch'?1.3:0.7),pid:e.pointerId,lastAct:Date.now(),
        cx:e.clientX,cy:e.clientY,gw,gh,gx:0,gy:0,_lx:NaN,_ly:NaN,boardRect:boardEl.getBoundingClientRect()};
  try{ pieceEl.setPointerCapture(e.pointerId); }catch(err){}   // 捕获: 手指移出页面也能收到up/cancel
  if(tutorialActive) document.getElementById('tut').classList.remove('show');
  sndPlace();                                    // 拾起: 与放下同音
  pieceEl.classList.add('dragging');
  computeAndApply(); e.preventDefault();
  cancelAnimationFrame(hintRaf); hintRaf=requestAnimationFrame(dragFrame);
});
// move 事件只记录坐标 + 心跳, 实际定位/hint 交给 dragFrame 每帧统一处理(合并高频事件)
document.addEventListener('pointermove',e=>{ if(drag && e.pointerId===drag.pid){ drag.lastAct=Date.now(); drag.cx=e.clientX; drag.cy=e.clientY; } });
// iOS兜底: pointermove断流时touchmove仍在发, 双通道保跟手
document.addEventListener('touchmove',e=>{
  if(!drag) return;
  const t=e.touches[0]; if(!t) return;
  drag.lastAct=Date.now(); drag.cx=t.clientX; drag.cy=t.clientY;
},{passive:true});
document.addEventListener('pointerup',e=>{
  if(!drag || e.pointerId!==drag.pid) return;
  computeAndApply();                             // 抬手前同步到最新坐标, 再吸附
  const t=snapTarget();
  const {i,p}=drag;
  resetDrag();
  if(t && canPlaceAt(p.v,t.r,t.c)) place(p,t.r,t.c,i);
  else { renderTray(); if(tutorialActive){ document.getElementById('tut').classList.add('show'); positionTutorial(); } }
});
function snapTarget(){
  if(!drag) return null;
  const b=drag.boardRect, unit=b.width/N;         // 用缓存 rect: 拖动全程零 getBoundingClientRect
  const r=Math.round((drag.gy-b.top)/unit), c=Math.round((drag.gx-b.left)/unit);
  if(r<-1||c<-1||r>N||c>N) return null;
  return {r:Math.max(0,Math.min(N-1,r)), c:Math.max(0,Math.min(N-1,c))};
}
function clearHints(){ if(hintLayer.firstChild) hintLayer.textContent=''; }
function addHint(idx,gbg,op,pulse){
  const cell=cells[idx];
  const d=document.createElement('div');
  d.className='hcell'+(pulse?' hpulse':'');
  d.style.cssText=`left:${cell.offsetLeft}px;top:${cell.offsetTop}px;width:${cell.offsetWidth}px;height:${cell.offsetHeight}px;background:${gbg};opacity:${op}`;
  hintLayer.appendChild(d);
}
let lastHintKey='';
function updateHints(){
  const t0=snapTarget();
  const key=(t0&&drag)? t0.r+','+t0.c+','+drag.i : '';
  if(key===lastHintKey) return;              // 落点未变: 跳过重建
  lastHintKey=key;
  clearHints();
  const t=snapTarget(); if(!t||!drag) return;
  const {p}=drag;
  if(!canPlaceAt(p.v,t.r,t.c)) return;
  const gbg=gemBg(p.color);
  const occ=new Set();
  for(const [dr,dc] of p.v){ const idx=(t.r+dr)*N+(t.c+dc); occ.add(idx); addHint(idx,gbg,.5,false); }
  // 可消除预览: 整行/列覆盖拖块色+脉冲
  const {rows,cols}=fullLinesWith(p.v,t.r,t.c);
  const mark=idx=>addHint(idx,gbg, (cells[idx].classList.contains('filled')||occ.has(idx))?1:.55, true);
  for(const r of rows) for(let c=0;c<N;c++) mark(r*N+c);
  for(const c of cols) for(let r=0;r<N;r++) mark(r*N+c);
}
function fullLinesWith(v,r0,c0){
  const tmp=grid.map(r=>r.slice());
  for(const [dr,dc] of v) tmp[r0+dr][c0+dc]='#fff';
  const rows=[],cols=[];
  for(let r=0;r<N;r++) if(tmp[r].every(x=>x)) rows.push(r);
  for(let c=0;c<N;c++){ let full=true; for(let r=0;r<N;r++) if(!tmp[r][c]){full=false;break;} if(full) cols.push(c); }
  return {rows,cols};
}

/* ================= 放置与结算 ================= */
function place(p,r0,c0,slot){
  for(const [dr,dc] of p.v) grid[r0+dr][c0+dc]=p.color;
  tray[slot]=null; placed++;
  addScore(p.v.length, null);
  vib(8); sndPlace();
  const {rows,cols}=fullLinesWith([],0,0);
  const lines=rows.length+cols.length;
  if(tutorialActive && lines>0) endTutorial(true);   // 首次消除: 引导毕业
  renderBoard();
  if(lines>0){
    combo=Math.min(combo+1, CFG.comboCap);
    stats.lines+=lines; if(combo>stats.maxCombo) stats.maxCombo=combo;
    const gain=lines*CFG.clearBase*combo;
    // 消除动画
    const idxs=new Set();
    for(const r of rows) for(let c=0;c<N;c++) idxs.add(r*N+c);
    for(const c of cols) for(let r=0;r<N;r++) idxs.add(r*N+c);
    idxs.forEach(i=>{                          // 从放置点向外波浪消失
      const rr=Math.floor(i/N), cc=i%N;
      const d=Math.min((Math.abs(rr-r0)+Math.abs(cc-c0))*15, 90);
      cells[i].style.setProperty('--d', d+'ms');
      cells[i].classList.add('pop');
    });
    lineFlash(rows,cols);
    vib(lines>=2?[30,40,30]:20);
    sndClear(lines);
    if(lines>=2 || combo>=2) sndBurst();            // 大消除: 明亮爆发音(轻快)
    // 夸奖+COMBO 拼成一行横幅
    let banner='';
    if(lines>=2) banner = lines>=4?'MUHTEŞEM!':lines===3?'İNANILMAZ!':'HARİKA!';
    if(combo>1) banner += (banner?' ':'')+'COMBO ×'+combo;
    if(banner) showBanner(banner, combo>1?combo:0);
    const anchor=cells[[...idxs][Math.floor(idxs.size/2)]].getBoundingClientRect();
    floatText('+'+gain, anchor);
    busy=true;
    setTimeout(()=>{
      idxs.forEach(i=>{ const r=Math.floor(i/N),c=i%N; grid[r][c]=0; cells[i].classList.remove('pop'); });
      renderBoard(); addScore(gain,null); busy=false; afterPlace(slot);
    }, CFG.clearAnimMs);
  } else {
    combo=0;
    afterPlace(slot);
  }
}
function refillSlot(slot){
  const st=stage();
  tray[slot]=dealPiece(st);
  // 救场: 拥挤且当前3块没有可放的小块时,把新发的换成可放小块
  const th=CFG.rescueThresh[st];
  if(th!==null && occupancy()>=th){
    const smalls=['B1','B2','B3'];
    const ok=tray.some(p=>p&&smalls.includes(p.type)&&anyPlacement(p.v));
    if(!ok){
      for(const sm of smalls){
        const p=makePiece(sm);
        if(anyPlacement(p.v)){ tray[slot]=p; break; }
      }
    }
  }
  renderTray();
  const el=document.querySelector(`.slot[data-i="${slot}"] .piece`);
  if(el){ el.classList.add('spawn'); setTimeout(()=>el.classList.remove('spawn'),240); }
}
function afterPlace(slot){
  refillSlot(slot);                       // 用掉一个立即补一个
  // 死局检测
  const alive=tray.some(p=>p&&anyPlacement(p.v));
  if(!alive) gameOver();
}
/* 分数滚动动画: 300ms补间到目标值 */
let dispScore=0, scoreRaf=null, rollSafety=null;
function rollScore(target){
  cancelAnimationFrame(scoreRaf); clearTimeout(rollSafety);
  const from=dispScore, t0=performance.now(), dur=300;
  const step=t=>{
    const k=Math.min((t-t0)/dur,1);
    dispScore=Math.round(from+(target-from)*k);
    scoreEl.textContent=dispScore;
    if(k<1) scoreRaf=requestAnimationFrame(step);
  };
  scoreRaf=requestAnimationFrame(step);
  // 保底: rAF被节流(切后台)时也保证最终落到目标值
  rollSafety=setTimeout(()=>{ cancelAnimationFrame(scoreRaf); dispScore=target; scoreEl.textContent=target; }, dur+100);
}
function addScore(n){
  score+=n;
  rollScore(score);
  scoreEl.classList.remove('bump'); void scoreEl.offsetWidth; scoreEl.classList.add('bump');
  if(score>best) bestEl.textContent=score;   // 破纪录实时跟涨(死局才落盘)
}
function lineFlash(rows,cols){
  const b=boardEl.getBoundingClientRect(), g=document.getElementById('game').getBoundingClientRect();
  const unit=b.width/N;
  const mk=(x,y,w,h)=>{ const d=document.createElement('div'); d.className='lineFlash';
    d.style.cssText+=`left:${x}px;top:${y}px;width:${w}px;height:${h}px`;
    document.getElementById('game').appendChild(d); setTimeout(()=>d.remove(),340); };
  for(const r of rows) mk(b.left-g.left, b.top-g.top+r*unit, b.width, unit);
  for(const c of cols) mk(b.left-g.left+c*unit, b.top-g.top, unit, b.height);
}
function floatText(txt,rect){
  const g=document.getElementById('game').getBoundingClientRect();
  const d=document.createElement('div'); d.className='float'; d.textContent=txt;
  d.style.left=(rect.left+rect.width/2-g.left-20)+'px';
  d.style.top =(rect.top-g.top-10)+'px';
  document.getElementById('game').appendChild(d);
  setTimeout(()=>d.remove(),950);
}
function showBanner(txt,comboN){
  document.querySelectorAll('.combo').forEach(x=>x.remove());   // 同屏只留一条
  const d=document.createElement('div'); d.className='combo'; d.textContent=txt;
  document.getElementById('game').appendChild(d);
  if(comboN>0) sndCombo(comboN);                      // combo 越高音越亮
  setTimeout(()=>d.remove(),1150);
}

/* ================= 开局 / 结束 ================= */
function gameOver(){
  playing=false; sndDead(); vib(90);
  endTutorial(false);                        // 引导层若还在, 收起
  document.getElementById('game').classList.add('dead');   // 棋盘+候选块渐灰: 死亡仪式感
  const isNew = score>best;
  if(isNew){ best=score; store.set('bb_best',best); bestEl.textContent=best; }
  document.getElementById('nb').textContent = isNew?'🎉 Yeni Rekor!':'';
  // 结算大数字从0滚到最终分(与弹窗出现同步)
  const fin=document.getElementById('finScore'); fin.textContent='0';
  setTimeout(()=>{
    const t0=performance.now(), dur=700, target=score;
    const step=t=>{ const k=Math.min((t-t0)/dur,1);
      fin.textContent=Math.round(target*(1-Math.pow(1-k,3)));
      if(k<1) requestAnimationFrame(step); };
    requestAnimationFrame(step);
    setTimeout(()=>fin.textContent=target, dur+120);   // rAF节流保底
  }, CFG.overDelayMs+150);
  document.getElementById('overBest').textContent=best;
  document.getElementById('overStats').textContent=`Temizlenen sıra: ${stats.lines} · Maks kombo: ×${Math.max(stats.maxCombo,1)}`;
  setTimeout(()=>document.getElementById('over').classList.add('show'), CFG.overDelayMs);
}
/* ===== 新手引导: 预铺一行差1格, 手指指引, 首次消除即毕业 ===== */
let tutorialActive=false;
const TUT_ROW=4, TUT_GAP=3;                      // 预铺行与缺口位置
function setupTutorial(){
  tutorialActive=true;
  const pal=['#dc4437','#f0862c','#f5c235','#52b545','#3ab4ec','#9b51d6','#e05aa8'];
  for(let c=0;c<N;c++) if(c!==TUT_GAP) grid[TUT_ROW][c]=pal[c%pal.length];
  tray[0]=makePiece('B1');                       // 保证第一块就能补缺口
  renderBoard(); renderTray();
  document.getElementById('tut').classList.add('show');
  positionTutorial();
}
function positionTutorial(){
  if(!tutorialActive) return;
  const game=document.getElementById('game').getBoundingClientRect();
  const slot=document.querySelector('.slot[data-i="0"]').getBoundingClientRect();
  const cell=cells[TUT_ROW*N+TUT_GAP].getBoundingClientRect();
  const f=document.getElementById('tutFinger');
  f.style.setProperty('--fx',(slot.left+slot.width/2-game.left-14)+'px');
  f.style.setProperty('--fy',(slot.top+slot.height/2-game.top-6)+'px');
  f.style.setProperty('--tx',(cell.left+cell.width/2-game.left-14)+'px');
  f.style.setProperty('--ty',(cell.top+cell.height/2-game.top-6)+'px');
  document.getElementById('tutTip').style.setProperty('--tipy',(cell.top-game.top-46)+'px');
}
function endTutorial(graduated){
  if(!tutorialActive) return;
  document.getElementById('tut').classList.remove('show');
  if(graduated){ tutorialActive=false; store.set('bb_tut','1'); }
}
function newGame(){
  grid=Array.from({length:N},()=>Array(N).fill(0));
  placed=0; score=0; combo=0; playing=true; busy=false;
  resetDrag();
  document.querySelectorAll('.float,.combo').forEach(x=>x.remove());
  cells.forEach(el=>el.classList.remove('pop'));
  dispScore=0; cancelAnimationFrame(scoreRaf); scoreEl.textContent='0';
  stats={lines:0,maxCombo:0}; document.getElementById('game').classList.remove('dead');
  document.getElementById('over').classList.remove('show');
  renderBoard(); refillTray();
  if(!store.get('bb_tut')) setupTutorial();      // 新玩家: 进引导
}
document.getElementById('retry').addEventListener('click',()=>location.reload());
/* Toast 轻提示 */
let toastTimer=null;
function showToast(txt){
  const t=document.getElementById('toast');
  t.textContent=txt; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),1400);
}
/* ✕ = 退出(宿主接管, 仅toast提示) */
document.getElementById('restart').addEventListener('click',e=>{ e.stopPropagation(); showToast('Çıkış'); });
document.getElementById('restart').addEventListener('pointerdown',e=>e.stopPropagation());
/* 结算弹窗: 再来一局 / 退出 */
document.getElementById('exitBtn').addEventListener('click',()=>showToast('Çıkış'));
window.addEventListener('resize',()=>{ renderTray(); positionTutorial(); if(drag) drag.boardRect=boardEl.getBoundingClientRect(); });

/* URL带?reset: 清空进度(重看引导/清纪录), 便于测试与演示 */
if(location.search.includes('reset')){
  try{ localStorage.removeItem('bb_tut'); localStorage.removeItem('bb_best'); }catch(e){}
  history.replaceState(null,'',location.pathname);
}
best=(+store.get('bb_best'))||0; bestEl.textContent=best;   // 脏数据NaN时归0
newGame();
</script>
